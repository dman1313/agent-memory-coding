<style>

  *{margin:0;padding:0;box-sizing:border-box}

       font-family:Inter,system-ui,sans-serif; overflow:hidden}

  svg:active{cursor:grabbing}

  header{position:fixed; top:0; left:0; right:0; z-index:10; padding:14px 22px 10px;

  .pills{display:flex; gap:4px; background:rgba(16,23,41,.7); border:1px solid var(--line); border-radius:999px; padding:3px}

                text-transform:uppercase; letter-spacing:.12em; margin-bottom:8px}

  .topline:hover{color:var(--accent)}
  .topline .deg{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--faint); margin-left:auto}
  .lnote{font-size:10.5px; color:var(--faint); margin-top:9px; line-height:1.45; border-top:1px solid var(--line); padding-top:8px}

         border-left:1px solid var(--line); padding:20px 20px 28px; overflow-y:auto;

                font-size:18px; cursor:pointer; line-height:1}
  .badge{display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:.14em;

  #panel .ex{font-size:13px; line-height:1.6; color:#c3cde0; margin-bottom:18px}
  #panel h4{font-size:10px; font-family:'IBM Plex Mono',monospace; color:var(--faint); font-weight:500;
            text-transform:uppercase; letter-spacing:.12em; margin:14px 0 7px}

  .lk{font-size:11px; padding:4px 9px; border-radius:7px; border:1px solid var(--line); background:var(--panel-2);

  .none{font-size:11px; color:var(--faint); font-style:italic}

    #panel{width:100%; top:auto; height:52vh; border-left:none; border-top:1px solid var(--line);

    #panel.open{transform:none}
    footer{display:none}
    .hint{display:none}
  }
</style>

const svg = d3.select('#graph');

let zoomK = 1;
function updateLabelVis(k) { zoomK = k ?? zoomK; applyEmphasis(); }

// ── neighborhood emphasis (hover / select / search / filter) ─
const neighbors = new Map(nodes.map(n => [n.id, new Set([...n.out, ...n.in, n.id])]));
let hovered = null, selected = null, query = '', typeFilter = 'all';

function visType(d) { return typeFilter === 'all' || d.type === typeFilter; }
function matchQ(d) { return !query || d.label.toLowerCase().includes(query) || d.id.toLowerCase().includes(query) || (d.tags||'').toLowerCase().includes(query); }

function applyEmphasis() {
  const focus = hovered || selected;
  const hood = focus ? neighbors.get(focus.id) : null;
  node
    .attr('fill-opacity', d => !visType(d) || !matchQ(d) ? .06 : (hood ? (hood.has(d.id) ? 1 : .1) : .92))
    .attr('stroke', d => (focus && d.id === focus.id) ? '#fff' : '#0a0f1e')
    .attr('stroke-width', d => (focus && d.id === focus.id) ? 2 : 1.2);
  link
    .attr('stroke', l => {
      const on = hood && (l.source.id === focus.id || l.target.id === focus.id);
      const dim = !visType(l.source) || !visType(l.target) || !matchQ(l.source) || !matchQ(l.target);
      return on ? 'rgba(125,211,252,.55)' : dim ? 'rgba(148,163,184,.04)' : (hood ? 'rgba(148,163,184,.06)' : 'rgba(148,163,184,.16)');
    })
    .attr('stroke-width', l => hood && (l.source.id === focus.id || l.target.id === focus.id) ? 1.6 : 1);
  label.attr('opacity', d => {
    if (!visType(d) || !matchQ(d)) return 0;
    if (focus && (d.id === focus.id)) return 1;
    if (hood) return hood.has(d.id) ? .95 : 0;
    if (query) return .95;
    return (d.degree >= 14 || zoomK >= 1.5) ? .9 : 0;
  });
}

node.on('mouseenter', (e,d) => { hovered = d; applyEmphasis(); })

svg.on('click', () => closePanel());

function selectNode(d) {
  selected = d; applyEmphasis(); openPanel(d);
}
function focusNode(id) {
  const d = nodes.find(n => n.id === id); if (!d) return;
  selectNode(d);
  const k = Math.max(zoomK, 1.6);
  svg.transition().duration(600).call(zoom.transform,

}
function chip(id) {

}
