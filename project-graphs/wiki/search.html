 week two it starts feeling like talking to someone who was in all your meetings.\""},{"p":"wiki/sources/knowledge-curator-build-capture.md","y":"source","ti":"Knowledge Curator Build — Session Capture","tg":"document","al":"","b":"Knowledge Curator Build — Session Capture Source - File: 2026-06-06 knowledge-curator-build-capture.md - Date: 2026-06-06 Participants: Dwayne, claude-code Core Content Capture from the 2026-06-05/06 session that made the LLM-curated wiki runnable. Records key decisions: the agent itself is the engine (not graphify); taxonomy = entities/concepts/sources + sop/principle subtypes; one curate skill with six modes; no PII scrubbing; schema precedence order. Key Entities - Dwayne Primeau Key Concepts - llm-curated-wiki - compile-raw Main Points - Engine = agent governed by AGENTS.md + config.md + curate-modes.md - Principle: git is the sync — don't nest repo inside iCloud/Dropbox - Processed-check reads frontmatter block only (not full file body) - curate entity: in-vault skill at .claude/skills/curate/ - Correction: imported compile-raw taxonomy conflicts with this vault's folders — method adopted, folders not"},{"p":"wiki/sources/loop-generator-concept.md","y":"source","ti":"Loop Generator App Concept","tg":"note","al":"","b":"Loop Generator App Concept Source - File: 2026-06-09 Loop generator app asks AI to define yesno success criteria.md - Date: 2026-06-09 Duration: 1m29s Core Content Early voice note concept for what became the agent-ready-coding-loop. The agent asks the user about their project and goals, then helps define binary yes/no success criteria. Examples given: PDF→Markdown conversion, drag-and-drop file processing. Success criteria must be unambiguous (yes/no, no in-between). Key Entities - Dwayne Primeau Key Concepts - Agentic AI Main Points - Core pattern: AI interviews user → generates binary success criteria → drives a build loop - Criteria must be yes/no: \"the software will produce X\" not \"the software will do well\" - This concept was later formalised as the Loop Generator / agent-ready-coding-loop v2.2"},{"p":"wiki/sources/market-data-api-alpaca.md","y":"source","ti":"Getting Started with Market Data API (Alpaca)","tg":"document","al":"Alpaca market data, market data API","b":"Getting Started with Market Data API (Alpaca) Source - File: Getting Started with Market Data API.md - URL: https://docs.alpaca.markets/us/docs/getting-started-with-alpaca-market-data - Created: 2026-06-09 Core Content Quick-start guide for Alpaca's market data API. Covers SDK installation (Python, JS, C , Go), API key generation, and how to request historical and real-time bar data. Saved alongside a brief note on trading research (2026-05-14: research gap cycles and historical patterns for next trade). Key Concepts (financial/trading — no wiki concept pages created; curator safety boundary: organise research, never recommend trades) Main Points - Alpaca SDK: pip install alpaca-py (Python), npm/Go/C also available - Free account; API keys from dashboard - Crypto historical data client does not require API keys"},{"p":"wiki/sources/notebooklm-wiki-research-2026-06-10.md","y":"source","ti":"NotebookLM Wiki Research (2026-06-10) - Summary","tg":"document","al":"NotebookLM Wiki Research, Wiki Architecture Research 2026-06","b":"NotebookLM Wiki Research (2026-06-10) - Summary Source - Original file: raw/processed/docs/notebooklm-wiki-research-2026-06-10.md - Ingested: 2026-06-10 - Origin: Dwayne's NotebookLM notebook \"LLM Wiki: A Compounding Personal Knowledge Base Architecture\", queried by the curator with seven architecture questions. Core Content Research-grounded answers on improving this vault's LLM-curated wiki. Five findings explicitly challenged the architecture: link-only retrieval degrades past a few hundred pages (mitigate with hybrid BM25+vector search and hub pages); pure append-only clutters retrieval without an archival tier; and concurrent flat-file writes by multiple agents risk corruption (\"Flat File Mutation Danger\"). It also recommended schema alignment during ingestion (pass the running entity/alias list to the compiler), pre-write validation hooks, a five-state page lifecycle ( draft → active → stale → contradicted → archived ), Generator-Verifier loops for conversation capture, and RAGAs-style answer-quality metrics. Four recommendations were adopted into the schema the same day (see ADR 0002); hybrid search was deferred until ~300 pages. This extends knowledge-vault best practices and refines compile-raw. Key Entities - No new standalone entities (methodological research) Key Concepts - LLM-curated wiki - knowledge-vault best practices - compile-raw Main Points - Retrieval ceiling : \"an index file works well for medium scales (up to about 100 materials or several hundred pages)\" — hybrid search needed beyond that. - Multi-agent risk : \"Flat File Mutation Danger\" — concurrent writes corrupt pages; fix with locking, directory ownership, or write contracts. - Lifecycle over pure append-only : superseded pages move to an archive tier, out of active retrieval, with history pr"},{"p":"wiki/sources/school-transcripts-aug-2025.md","y":"source","ti":"School Transcripts: August 2025","tg":"note","al":"school transcripts Aug 2025","b":"School Transcripts: August 2025 Source - Files: 3 transcripts — 2025-08-19, 2025-08-25 (×2) - Speaker: Dwayne Primeau Core Content Late summer 2025 voice notes focused on writing curriculum development and pricing model discussion. Topics: data collection in student writing and progress tracking; launching writing routines and schedules; changing the pricing model (likely for a school or Human Good product) and enhancing literacy through exploration. Key Entities - Dwayne Primeau - ICS Paris Key Concepts - Guided Reading Main Points - Writing routines formalised with schedules - Data collection system for student writing progress - Pricing model review (context unclear — could be school fees or Human Good product)"},{"p":"wiki/sources/school-transcripts-jan-2025.md","y":"source","ti":"School Transcripts: January–March 2025","tg":"note","al":"ICS Paris transcripts Jan-Mar 2025, school voice notes 2025 Q1","b":"School Transcripts: January–March 2025 Source - Files: ~20 voice note transcripts, 2025-01-08 to 2025-03-14 - Speaker: Dwayne Primeau and colleagues - Schools: ICS Paris, Alpha Boulevard Core Content Continuation of ICS Paris leadership voice notes. Topics: January curriculum and staffing updates (PYP/DP planning, PE teacher, math coach), admissions process and BML implementation, literacy assessment (running records, writing progress), attendance and student support, library organisation, Arabic-language school maintenance discussion (renovation/scaffolding logistics), swimming class supervisor concerns at Alpha Boulevard, Kit's meltdown incident and team communication, school renovation and restructuring planning. Key Entities - ICS Paris - Dwayne Primeau - Kit - Angela - Malou Key Concepts - IB PYP - Guided Reading - DEIJ - Essential Agreements Main Points - Jan 2025: PYP/DP planning, math coach onboarding, PE uniform discussion - Admissions: BML system implementation (2025-01-22) - Literacy: running records assessment, writing curriculum strategies - Renovation: major school restructuring — two music rooms → classrooms, hub storage, maternal area repurpose - Swimming: supervisor issues at Alpha Boulevard campus - Kit incident: meltdown requiring team communication protocol review"},{"p":"wiki/sources/school-transcripts-nov-2024.md","y":"source","ti":"School Transcripts: November–December 2024","tg":"note","al":"ICS Paris transcripts Nov 2024, school voice notes 2024","b":"School Transcripts: November–December 2024 Source - Files: 40+ voice note transcripts, 2024-11-04 to 2024-12-16 - Speaker: Dwayne Primeau (principally) and staff colleagues - School: ICS Paris Core Content Voice note transcripts from Dwayne's first months as head/principal at ICS Paris. Topics span: art teacher management (Lucy's collaboration resistance, lesson planning, essential agreements), staffing challenges (Grade 1 vacancy, Nicole's maternity, co-teaching options), literacy program development (guided reading, library setup), DEIJ and wellness initiatives, IB PYP curriculum planning (CPMs, TOTL), parent communication, student council, restorative practices, and personal reflections on housing and resilience. Key Entities - ICS Paris - Dwayne Primeau - Lucy - Malou - Tato - Justina - Sebastian - Victoria - Nicole - Gloria - Claudine Key Concepts - IB PYP - DEIJ - Guided Reading - TOTL - ATLs - Essential Agreements Main Points - Art program restructure: Lucy moved to canteen, essential agreements drafted, TOTL required - Grade 1 staffing: Nicole on maternity → advertising, co-teaching model considered - Literacy: guided reading program launch challenged by librarian issues - DEIJ: back-to-wellness initiative, restorative meeting protocol, racial bias concerns in Dec - NYPDP: separate school context mentioned (heads of department challenges) - Personal: Dwayne navigating housing challenges while leading the school"},{"p":"wiki/sources/symposium-rust-agents.md","y":"source","ti":"Symposium Keynote: Rust, Agents, and Community Toolchain","tg":"note","al":"","b":"Symposium Keynote: Rust, Agents, and Community Toolchain Source - File: 2026-05-06 Symposium keynote… - Date: 2026-05-06 Duration: 60m Core Content Paris conference keynote by Nico (lead Rust designer, Amazon). Symposium project: agent-targeted Rust toolchain solving stale training data problem — crate authors write skills (Markdown + metadata), Symposium bridges across agent vendors. Also covers: why Rust works well with agents (type system guardrails), problem of no central agent marketplace (no NPM equivalent for agents). Key Entities - Symposium - Dwayne Primeau — attendee Key Concepts - Agentic AI Main Points - Stale training data problem: Claude recommends outdated Rust patterns - Symposium: install via Cargo, hooks and skills configured automatically - No central agent marketplace exists — ecosystem gap - Rust + agents: type system guides agents toward correct solutions"},{"p":"wiki/sources/welsh-rights-activity.md","y":"source","ti":"Gweithgareddau ar Hawliau (Welsh — Rights Activities)","tg":"note","al":"Welsh rights activity, UN rights child Welsh","b":"Gweithgareddau ar Hawliau (Welsh — Rights Activities) Source - File: 2025-04-30 Gweithgareddau ar hawliau a chefnogaeth unigedd plentyn.md - Date: 2025-04-30 Duration: 7m35s Language: Welsh + English Core Content Voice note in Welsh with some English sections. Describes a rights-based classroom activity connected to the UN Convention on the Rights of the Child — specifically the right to privacy/solitude. Students (labelled A and B) were given different experiences to explore what it feels like when a right is granted vs. denied. Activity involved groups of 3–5 children. Key Entities - Dwayne Primeau — facilitator Key Concepts - IB PYP — rights as a theme fits PYP transdisciplinary learning Main Points - Theme: rights — drawn from UN Convention on the Rights of the Child - Activity: differentiated experience (A vs B groups) to make rights tangible - Note: transcript degrades into repetitive loops mid-recording (speech-to-text artefact) - Related file: 2025-04-30 UN convention on the rights of the child.md"},{"p":"Plan/tasks/T-0001-retire-diverged-mac-tree.md","y":"task","ti":"T-0001 — Retire the diverged ~/agent-memory working tree on the Mac","tg":"todo P2 created_by: hyperagent","al":"","b":"Brief MacH confirmed (decision, 2026-06-10T18:25Z) that the iCloud vault path is the fleet's source of truth and that ~/agent-memory/ on the Mac is a stale personal copy that diverged ~24h earlier. Done looks like: the local tree is either deleted or re-pointed (e.g. symlink to the iCloud path), no agent writes to it, and the retirement is logged to ACTIVITY. Log - 2026-06-11 hyperagent — seeded from MacH's 2026-06-10 decision."},{"p":"Plan/tasks/T-0002-verify-vault-sync-launchd.md","y":"task","ti":"T-0002 — Verify com.dwayne.vault-sync launchd job is actually running","tg":"todo P1 created_by: hyperagent","al":"","b":"Brief NOW.md sat ~15h stale on 2026-06-11 despite sync.sh + the 900s launchd job installed per ADR 0002 (which had already once been found missing). The janitor (auto-close, channel archive, board render) rides this job — it only works if the job runs. Done looks like: launchctl list grep vault-sync shows the job loaded, a sync cycle observed end-to-end (pull → build-context.sh → push), findings logged. If dead: reinstall the plist and log root cause. Log - 2026-06-11 hyperagent — seeded; staleness observed via GitHub API (last auto-sync push 2026-06-10 22:04Z)."},{"p":"Plan/tasks/T-0003-fix-igcse-concept-pipeline.md","y":"task","ti":"T-0003 — Fix IGCSE Biology concept pipeline (missing concept-progress.json, 353 failed runs)","tg":"todo P1 created_by: hyperagent","al":"","b":"Brief Per mrclean-audit-2026-06-11.md finding 1 (score 9/10): the hourly cron errors every run — FileNotFoundError for concept-progress.json ; 353 runs completed, failing silently 24x/day. Done looks like: state file restored (or script handles absence gracefully), next 3 runs last status: ok , and cadence reviewed (audit recommends every 3-6h instead of hourly). Log - 2026-06-11 hyperagent — seeded from MrClean audit Stage 4 quick win 1."},{"p":"Plan/tasks/T-0004-dream-cleanup-bug.md","y":"task","ti":"T-0004 — Fix DREAM cleanup-before-analysis bug (7th+ occurrence)","tg":"todo P2 created_by: hyperagent","al":"","b":"Brief Open blocker since 2026-06-06: DREAM nightly reflection deletes/cleans session files before analysis runs — zero session files available, 516 errors logged, 7+ occurrences. hermes decided (2026-06-10) to give the session search fix one more night, else pause the cron. Done looks like: DREAM produces a real analysis from existing session files on two consecutive nights, or the cron is paused with a decision logged. Log - 2026-06-11 hyperagent — seeded from NOW.md blockers + hermes 2026-06-10 decision."},{"p":"Plan/tasks/T-0005-hal-telegram-delivery.md","y":"task","ti":"T-0005 — Fix HAL Daily Brief Telegram delivery error","tg":"todo P3 created_by: hyperagent","al":"","b":"Brief Per mrclean-audit-2026-06-11.md: HAL's 14:00 brief content succeeds but Telegram delivery intermittently fails with RuntimeError(\"cannot schedule new futures after interpreter shutdown\"). Done looks like: root cause identified (gateway shutdown timing), retry logic or service restart applied, last delivery error null on next runs. Log - 2026-06-11 hyperagent — seeded from MrClean audit medium item 6."},{"p":"Plan/tasks/T-0006-vps-cache-cleanup.md","y":"task","ti":"T-0006 — Reclaim ~4.5GB VPS disk (npx, npm, huggingface caches)","tg":"todo P3 created_by: hyperagent","al":"","b":"Brief Per mrclean-audit-2026-06-11.md quick wins 2-4 (all 99% confidence): ~/.npm/ npx/ 1.9GB, ~/.cache/huggingface/ 1.6GB, ~/.npm/ cacache/ 834MB — all safe to clear. Disk at 75% with swap at 94%. Done looks like: caches cleared, df -h / evidence logged showing recovered space. Log - 2026-06-11 hyperagent — seeded from MrClean audit Stage 4 quick wins 2-4."},{"p":"Plan/tasks/T-0007-stamp-archived-raw-files.md","y":"task","ti":"T-0007 — Stamp processed:true on archived raw files (re-digestion landmine)","tg":"done P1 hyperagent","al":"","b":"Brief The 2026-06-10 batch compile moved ~90 raw files to raw/processed/ but did not write the processed: true frontmatter stamps (verified on 3 samples, 2026-06-11). The compile mode finds work by that stamp across raw/ , so a future run could try to re-digest the whole archive — the 10-files-ask-first rule is the only safety net. Done looks like: every .md under raw/processed/ carries processed: true + processed at (+ a retro note), and the janitor's stamp-missing lint reads 0. Log - 2026-06-11 hyperagent — claimed (todo → claimed → doing), logged to ACTIVITY. - 2026-06-11 hyperagent — done: 42 files stamped (processed: true + processed at + retro note) via API; janitor stamp-missing count 42 → 0. First task through the full board lifecycle. - 2026-06-11 hyperagent — seeded from digestion walkthrough verification; will claim and execute via API."},{"p":"Plan/tasks/T-0008-wiki-orphans-dead-links.md","y":"task","ti":"T-0008 — Curator pass — 8 orphan sources, 5 dead template links, backlink hygiene","tg":"todo P2 created_by: hyperagent","al":"","b":"Brief From the 2026-06-11 wiki graph build (and matching the 2026-06-10 lint): 8 source records have zero inbound links (arabic-maintenance-transcript, being-good-kindness, hiring-pitch-paris-conference, knowledge-curator-build-capture, loop-generator-concept, market-data-api-alpaca, school-transcripts-aug-2025, welsh-rights-activity) and 5 template/rule pages link to the retired sources/config page. Done looks like: each orphan source is cited from the entity/concept pages it feeds (or consciously archived per lifecycle), template links repointed, /curate lint clean on these two classes. Log - 2026-06-11 hyperagent — seeded from wiki-graph snapshot (71 pages, 356 links)."},{"p":"Plan/tasks/T-0009-wiki-search-page.md","y":"task","ti":"T-0009 — Generated search page — full-text over wiki, board, projects, decisions","tg":"todo P2 created_by: hyperagent","al":"","b":"Brief Vault Fitness Loop lever L1 (spec: sdd/specs/2026-06-11-vault-fitness-loop/). Build a self-contained project-graphs/wiki/search.html — client-side full-text search (title, tags, aliases, body) across wiki/ pages, Plan/tasks/, Project/ resume pages, and DECISIONS.md, in the same style as graph.html. Done looks like: open the page, type a word, get ranked hits with excerpts and direct file paths; regenerable on request like the graph. Log - 2026-06-11 hyperagent — seeded as fitness-loop iteration-1 lever."},{"p":"Project/agent-memory.md","y":"project","ti":"Agent Memory (this vault)","tg":"The shared vault itself — fleet coordination layer + Dwayne's second brain (resu","al":"","b":"Agent Memory (this vault) The vault is dual-purpose: the fleet's coordination layer AND Dwayne's second brain. Spec: sdd/specs/2026-06-11-fleet-plan-board/ . Status now Fleet Plan Board + janitor shipped 2026-06-11 (hyperagent): Plan/ board live with 8 seeded tasks, build-context.sh now renders the board into NOW.md, auto-closes stale sessions 48h, archives DONE channel messages 48h, and flags raw-inbox backlog + missing archive stamps. Suspected issue: the Mac launchd vault-sync job may be down (NOW.md sat ~15h stale on 2026-06-11) — T-0002. Next steps - T-0002 (MacH): verify/restore the com.dwayne.vault-sync launchd job — the janitor rides it - T-0001 (MacH): retire the diverged ~/agent-memory Mac working tree - After a week of board use: review spec success criteria 1/2/6 and mark the spec Done Where things live - Repo: github.com/dman1313/agent-memory-coding (private) · Mac iCloud path + VPS clone per STANDING-ORDERS - Board: Plan/ (contract in Plan/README.md, dashboard in Plan/board.md) · Fleet state: NOW.md - Generator/janitor: build-context.sh (runs via sync.sh every 15 min on Mac) · Spec/plan/tasks: sdd/specs/2026-06-11-fleet-plan-board/ Open tasks - T-0001 · T-0002"},{"p":"Project/agent-ready-coding-loop.md","y":"project","ti":"agent-ready-coding-loop","tg":"The Loop Generator — reusable contract-driven starter prompt for non-technical h","al":"","b":"What it is A reusable starter prompt that turns any coding agent into an interviewer, contract-writer, and loop-driven builder for non-technical humans . The human's power = the contract (binary YES/NO criteria, plain English) + the scoreboard (one command, ./check , runnable forever without the agent). Repo: https://github.com/dman1313/agent-ready-coding-loop (private; renamed from loop-generator 2026-06-09; flip public with gh repo edit dman1313/agent-ready-coding-loop --visibility public ) Local: /Volumes/M2 Media/Coding Dwayne/Claude/loop-generator/ (folder kept old name on purpose) Files: PROMPT.md (the artifact) + README.md . Git history: commit 1 = Dwayne's v2.1 verbatim, commit 2 = v2.2 — the diff between them IS the review. Flow Phase 1 interview (incl. running-cost question) → Phase 1.5 ethics check (fake-data-only rule when real people's data involved) → Phase 2 contract: 8–20 binary criteria tagged [AUTO]/[HUMAN]/[INSPECT], signed then LOCKED, saved to CONTRACT.md with amendment history → Phase 3 loop: build → full suite → scoreboard; checkpoint commit per improvement; budget = 6 consecutive attempts without improvement; Stuck Report → STUCK.md → Phase 4 handover ( LATER.md , setup guide, \"if it breaks\" recipe). v2.2 fixes over Dwayne's v2.1 (the review findings) 1. Contract previously lived only in chat → now on disk + resume-don't-restart protocol (finds CONTRACT.md, skips re-interview). 2. Loop exit was unreachable ([HUMAN] criteria never entered the loop) → all-AUTO-green now triggers ONE bundled human sign-off sitting. 3. \"6 attempts\" ambiguity → counts stagnation; a NO→YES resets the budget. 4. Mid-build additions = formal amendments, never quiet extras. Track record First real run: project-classroom-mirror (2026-06-09/10) — interview redesigned an ill"},{"p":"Project/classroom-mirror.md","y":"project","ti":"classroom-mirror","tg":"Privacy-first classroom webcam tool — pose-based behaviour numbers, never video;","al":"","b":"What it is Classroom Mirror turns classroom moments into numbers, never video , for Dwayne Primeau's teaching context (France, IB school — GDPR/CNIL/EU-AI-Act constraints are load-bearing). - Mode 1 — strategy tracking: is a support strategy working for ONE designated child? Consent-gated, pseudonymous (LIMS codes with a mandatory digit — names can't pass), zone-based tracking (teacher drags a box; pose detection, no faces). Baseline-vs-strategy sessions → neutral before/after report. - Mode 2 — whole-class reflection: aggregate-only room patterns (hand-raises, movement level, people in view) as a mirror for the teacher's practice. No per-child column exists in the schema — anonymity by construction. Location: /Volumes/M2 Media/Coding Dwayne/Claude/classroom-mirror/ Status (2026-06-10): 14/14 AUTO criteria YES; awaiting Dwayne's 5 [HUMAN] sign-offs ( HUMAN-CHECKS.md ). Git local, 4 commits, NOT pushed to GitHub (not requested). Origin — the ethics redesign Dwayne's original ask was \"webcam tags kids, times them in seats, counts hand-raises.\" Redesigned through the Loop Generator interview: face-tagging minors = biometric data (CNIL struck down facial recognition in schools); emotion/attention inference in education = prohibited by EU AI Act since Feb 2025. The legitimate kernel — \"is this strategy supporting this child?\" — needs no identification tech. Per-child LIMS rows for the whole class were deliberately rejected (pseudonymised ≠ anonymous); recorded in LATER.md. The contract method First real run of agent-ready-coding-loop v2.2: CONTRACT.md (19 binary criteria, signed via plan approval), ./check prints a plain-English scoreboard (guardrails first), checkpoint commits per scoreboard improvement, LATER.md , HUMAN-CHECKS.md . The loop caught a real bug: guardrail 4 f"},{"p":"Project/free-claude-code.md","y":"project","ti":"free-claude-code","tg":"Middleware proxy routing Anthropic API traffic to alternative AI providers","al":"","b":"What it is Free Claude Code (FCC) is a middleware proxy that routes Anthropic Messages API traffic from Claude Code CLI (and other clients) to alternative AI providers. Keeps the client-side protocol stable while allowing free, paid, or local models. Location: /Volumes/M2 Media/Coding Dwayne/Claude/free-claude-code/ Status: Active — 506+ commits, last commit 2026-05-22. Published at github.com/Alishahryar1/free-claude-code . Version 2.0.0. Tech Stack - Python 3.14, FastAPI, Uvicorn, httpx - Testing: pytest + pytest-asyncio + pytest-xdist - Linting: ruff, type checking: ty - Package manager: uv (hatchling) Key Structure - api/ — FastAPI routes and admin UI - providers/ — 12+ provider backends (nvidia nim, deepseek, kimi, ollama, llamacpp, open router, fireworks, zai, opencode, etc.) - core/ — shared Anthropic protocol logic - messaging/ — event pipeline, rendering, transcription, platforms - cli/ — CLI entrypoints Key Features - 11+ provider backends with per-model routing - Native Claude Code /model picker support - Streaming, tool use, reasoning/thinking block handling - Admin UI at /admin - Voice transcription (Whisper local or NVIDIA RIVA) - CI enforced: ruff format, ruff check, ty, pytest Why: Core infrastructure for routing LLM calls — connects to Dwayne's GLM/Z.ai setup and multi-provider strategy. How to apply: When adding new providers or fixing API routing issues, this is the proxy layer. Links - claude-code-glm"},{"p":"Project/hermes-ecosystem.md","y":"project","ti":"hermes-ecosystem","tg":"Hermes/OpenClaw agent ecosystem — Sherlock, Special Ops, DREAM, Firehose fleet","al":"","b":"Skills in the Anti-Gravity/Skills repo are designed as instructions for AI agents (Hermes, OpenClaw), not for direct human use in Claude Code. The agent fleet includes Sherlock (research), Special Ops (orchestration), DREAM (quality tracking), and Firehose (trending topics). Communication Officer agent is planned but not yet built. Why: Changes how skills are authored — they need to be agent-consumable, self-contained workflows with clear handoffs between agents. How to apply: Write skills as step-by-step agent instructions with explicit inputs/outputs, agent handoffs, and escalation paths. Don't assume human-in-the-loop for routine steps. Status now Section added 2026-06-11 (resume-point rollout, spec M2). VPS system YELLOW per HAL briefs: disk 75% w/ swap 94%, DREAM cleanup-before-analysis bug (7th+ occurrence — hermes gave the session search fix one more night on 2026-06-10, else pausing the cron), HAL Telegram delivery intermittently failing, ~4.5GB reclaimable caches identified by MrClean. 17 agent skills active; full inventory synced to MacH 2026-06-10. Next steps - T-0004 (hermes): DREAM bug — verify the fix or pause the cron with a logged decision - T-0005 (hermes): HAL Telegram delivery retry/restart - T-0006 (hermes): clear npx/npm/huggingface caches, log df evidence Where things live - VPS: 65.109.141.110 ( ~/.hermes/ skills, scripts, cron) · dashboards: hermesdash.humangood.ai (:9119) - Audits: mrclean-audit-2026-06-11.md · system map: PROJECT-MAP.md Open tasks - T-0004 · T-0005 · T-0006"},{"p":"Project/hermes-metaclaw.md","y":"project","ti":"hermes-metaclaw","tg":"hermes-metaclaw package — MetaClaw integration for Hermes Agent with skill injec","al":"","b":"What it does MetaClaw is a proxy layer that intercepts LLM calls and injects skills/learning signals. hermes-metaclaw adds Hermes Agent as a supported agent type. Location: /Volumes/M2 Media/Coding Dwayne/Claude/projects/hermes-metaclaw/ Key integration points - Hermes config at ~/.hermes/config.yaml patched to use provider: \"custom\" with base url: \"http://127.0.0.1:{port}/v1\" - Auto-patches via metaclaw hermes/ init .py runtime patching of metaclaw.claw adapter. ADAPTERS - Hermes has NO daemon restart — config change takes effect on next hermes invocation Files - metaclaw hermes/ init .py — auto-registers hermes adapter via runtime patch - metaclaw hermes/hermes adapter.py — patches ~/.hermes/config.yaml (YAML) - metaclaw hermes/cli.py — CLI extensions (hermes setup/status/revert) - scripts/launch hermes metaclaw.py — full launch helper - scripts/install.sh — install script Usage flow 1. pip install -e hermes-metaclaw 2. Edit ~/.metaclaw/config.yaml : claw type: hermes 3. metaclaw hermes setup — patches Hermes config 4. metaclaw start — starts proxy 5. hermes — in another terminal, routes through MetaClaw proxy"},{"p":"Project/multica-dashboard.md","y":"project","ti":"multica-dashboard","tg":"Front-end dashboard for managing an AI agent network with visualization and cale","al":"","b":"What it is A front-end dashboard for managing an AI agent network. Provides visual interface for monitoring agents, tasks, calendar events, and activity logs. Location: /Volumes/M2 Media/Coding Dwayne/Claude/multica-dashboard/ Status: Stalled — last modified 2026-04-29. No git repo. Uses entirely mock data. Tech Stack - TypeScript, React 19, Vite 8, Zustand, Tailwind CSS v4 - @xyflow/react (agent network graph), Recharts, FullCalendar, Framer Motion Key Features - Agent network visualization (xyflow graph) - Calendar panel (FullCalendar), task board, activity feed - Command routing to named agents (Aurora, Bridge Builder, HAL) - Animated panel switching (Framer Motion) - Dark theme with custom color tokens Why: Visual management layer for the agent fleet. Currently frontend-only with mock data. How to apply: Needs backend API integration to connect to live agent data. Could connect to Hermes WebUI (port 8787) or Symphony dashboard. Links - Project/hermes-ecosystem - Project/symphony"},{"p":"Project/newsletter-platform.md","y":"project","ti":"newsletter-platform","tg":"Agent-first newsletter production system — Telegram voice to polished HTML email","al":"","b":"What it is Agent-first newsletter production system. Turns Telegram voice notes and photos into polished, accessible HTML email newsletters. Location: /Volumes/M2 Media/Coding Dwayne/Claude/newsletter-platform/ Status: Stalled — last modified 2026-04-13. No git repo. Several roadmap items unchecked. Tech Stack - TypeScript, Next.js 14 (App Router), Tailwind CSS, Zod - OpenAI Whisper (transcription), OpenAI-compatible LLM (content generation) - File-based JSON storage (MVP, no database yet) Pipeline 1. Receive from Telegram → 2. Transcribe → 3. Extract topic → 4. Research → 5. Rewrite for audience → 6. Structure blocks → 7. Render HTML → 8. Export → 9. Human review Key Features - SSE-based real-time pipeline progress - Multiple export formats (HTML, plaintext, EML, social summary, WhatsApp broadcast, PDF flyer) - A/B subject line testing, audience targeting commands - WCAG AA accessibility compliance - Three agent providers (stub, openclaw, hermes) Why: Automates newsletter production from voice input. Uses the Hermes/OpenClaw agent system for content generation. How to apply: Needs database integration, email distribution, and cron scheduling to complete. Connected to Project/hermes-ecosystem. Links - Project/hermes-ecosystem"},{"p":"Project/pyp-migration-unit-2026-06-03.md","y":"project","ti":"Grade 5 PYP Human Migration Unit Package","tg":"Grade 5 PYP Human Migration unit package with reflective process system","al":"","b":"Grade 5 PYP Human Migration Unit Package Completed Work 1. Full unit package generated (48,475 chars) covering all 20 scaffold sections 2. 5 custom AI-generated images extracted from Gemini and embedded in Word doc 3. Word document created: Grade 5 PYP Human Migration Unit Package.docx (4.5MB) 4. Google Drive folder: 00- kimi pyp prepared for upload 5. Reflective process system added (Sections 21-30): - Reflective Process Framework (living curriculum philosophy) - Teacher Reflection Journal (pre-unit, weekly, mid-unit, post-unit) - Student Voice Capture Tools (5 different feedback instruments) - Evidence Collection Planner - Mid-Unit Adjustment Protocol with decision tree - Post-Unit Review Framework (4-part analysis) - Iteration Log & Version History (semantic versioning) - Cross-Year Improvement Tracker - Collaborative Reflection Protocol (grade-level teams) - AI-Assisted Reflection Prompts 6. Standalone templates created: - Reflective Process Quick Reference.md - Teacher Reflection Journal Template.md - Student Voice Tools.md Files Location - /Users/dwayne-primeau/Grade 5 Migration Unit Output/ - Contains: 1 Word doc + 5 PNG images + 3 standalone reflection templates Blockers - Google Doc created earlier appears empty/untitled (text insertion did not persist) - Automated upload to Google Drive blocked by macOS security and browser restrictions - Manual drag-and-drop from Finder to Drive browser window recommended"},{"p":"Project/study-pipeline.md","y":"project","ti":"Study Pipeline (IGCSE Biology)","tg":"IGCSE Biology study-package pipeline on the VPS (NotebookLM-driven concept gener","al":"","b":"Study Pipeline (IGCSE Biology) NotebookLM-driven generation of study packages (flashcards, quizzes, concept deep-dives) for IGCSE Biology, running on the VPS via cron + concept-pipeline.sh . Status now BROKEN since the workdir lost concept-progress.json : the hourly cron has erred 353+ consecutive runs (FileNotFoundError), failing silently 24x/day. Audit: mrclean-audit-2026-06-11.md finding 1 (9/10). Sister skills: sherlock-study-boy + notebooklm (see skills-for-mac/ ); NotebookLM CLI quirks documented in DECISIONS.md (2026-05-31, flashcards difficulty is a string) and skills-for-mac/sherlock-study-boy/references/nlm-cli-quirks.md . Next steps - T-0003 (hermes): restore/regenerate concept-progress.json or make the script tolerate absence; confirm 3 clean runs - Reduce cadence from hourly to every 3-6h per the audit recommendation Where things live - VPS: ~/.hermes/scripts/concept-pipeline.sh + its workdir · cron \"IGCSE Biology Concept Pipeline\" (hourly) - Skills: skills-for-mac/notebooklm/ , skills-for-mac/sherlock-study-boy/ · study outputs: VPS study-packages/ Open tasks - T-0003"},{"p":"Project/symphony.md","y":"project","ti":"symphony","tg":"Multi-agent coding orchestrator — Rust daemon that dispatches AI agents to resol","al":"","b":"What it is Symphony is a multi-agent coding orchestrator written in Rust. It polls issue trackers (Linear, GitHub, or local JSON), creates per-issue workspaces, and dispatches AI coding agents (Claude Code, Codex, Hermes) to resolve issues automatically. Location: /Volumes/M2 Media/Coding Dwayne/symphony/ Status: Active — last commit 2026-05-25 Plans: 3 detailed plans in /Volumes/M2 Media/Coding Dwayne/Claude/plans/ - resilient-launching-patterson.md — Multi-backend agent runner (fork Symphony crates) - stateful-sprouting-bonbon.md — Standalone mode (LocalTracker, no Linear required) - sunny-painting-moler.md — Backends management page for dashboard Tech Stack - Rust (edition 2024, MSRV 1.85), Tokio, Axum, SQLx (Postgres), Clap - 8 crates: symphony-core, symphony-config, symphony-tracker, symphony-workspace, symphony-agent, symphony-orchestrator, symphony-observability, symphony-cli Key Features - 3 backend types: command-based ( claude -p ), HTTP/OpenAI-compatible, Codex app-server protocol - Label-based backend selection per issue - Built-in web dashboard (chat, swarms, tasks, backends, reports tabs) - PostgreSQL persistence, workspace scoping Current Dashboard State (2026-05-25) - Local dashboard runs at http://127.0.0.1:18119/ from /Volumes/M2 Media/Coding Dwayne/symphony/ . - Linear API token is stored in macOS Keychain service symphony-linear-api-key ; do not print it. - WORKFLOW.md is configured locally for Linear project slug 5ab40fc3fbf2 ( Hermes Dashboard ). - Dashboard Tasks now reads Linear issues and can create or update Linear issues in the configured project; destructive deletes still happen in Linear. - Scheduler dispatches Linear issues in active states Todo and In Progress ; moving issues out of those states pauses dispatch. - HUM-25 was moved to Backl"},{"p":"Project/vault-purpose.md","y":"project","ti":"Vault Purpose","tg":"Dual purpose — the fleet's coordination layer AND Dwayne's second brain; fleet c","al":"","b":"Vault Purpose Rewritten 2026-06-11 per Dwayne (spec amendment, sdd/specs/2026-06-11-fleet-plan-board/): the previous version described only the second-brain half. This vault is two things at once : 1. The fleet's coordination layer — shared memory and operating system for all of Dwayne's coding agents: session ritual, ACTIVITY log, NOW dashboard, Plan board, per-agent profiles, decisions. 2. Dwayne's second brain — the fleet works with Dwayne and collects information for him here. Knowledge compounds in wiki/ (Karpathy LLM-wiki pattern); working state lives in Project/ resume points and Plan/ tasks. The day-one test: an agent says \"I'm MacH — I look at the vault right away: okay, I was working on this program before. I read the content, and I start from there.\" Two file reads ( Agents/{name}.md → Project/<slug .md ), no re-researching, no archaeology. The vault is the central place for everyone. Design Principles 1. Structured wiki over vector embeddings — human-readable markdown with wikilinks (Karpathy's approach). 2. Raw intake → curated wiki → working state — raw/ (immutable inbox) → wiki/ (append-only knowledge graph) → Project/ + Plan/ (resume points and work queue) referencing wiki as context. 3. Append-only history — dated sections, never overwrite. Stopping is never losing. 4. Cross-link aggressively — islands are failures; the graph's value compounds through connections. 5. Research once — check the vault before researching (resume page → wiki/index.md → Reference/ → DECISIONS.md ); write findings back where they belong. 6. State keyed by project name — the same slug names the ACTIVITY entries, the board task project: field, and the Project/<slug .md resume page. Rules for Agents Full protocol: STANDING-ORDERS.md (fleet) and schema/AGENTS.md (wiki, read-only)."},{"p":"Project/wiki-obsidian.md","y":"project","ti":"wiki-obsidian","tg":"Obsidian vault implementing Karpathy's LLM Wiki pattern, synced via Dropbox from","al":"","b":"This directory is an Obsidian vault implementing the LLM Wiki pattern (Karpathy, 2026). The canonical version lives on the VPS; synced via Git. - Server path: /home/ubuntu/wiki - Remote: github.com/dman1313/agent-memory-coding - Sync: Git-only (Dropbox sync removed May 2026) - Raw source for the pattern: raw/articles/karpathy-llm-wiki-2026.md (already ingested 2026-04-18) Why: This is a persistent, compounding knowledge base. The LLM (Claude Code) is the wiki maintainer — it writes, updates, and cross-links pages. The human curates sources and asks questions. How to apply: Read order: schema/AGENTS.md → wiki/index.md → wiki/log.md → target pages. The four-layer architecture ( raw/ inbox, raw/processed/ archive, wiki/ graph, schema/ rules) is non-negotiable. New pages go to wiki/index.md ; curator actions go to wiki/log.md . Vault-root schema/ holds master rules; wiki/schema/ holds wiki-local config. Status now Section added 2026-06-11 (resume-point rollout, spec M2). Wiki healthy after kiro's 2026-06-10 full compile (93 raw → 20 entities, 13 concepts, 19 sources; 71 pages, 356 links per the 2026-06-11 graph snapshot). Two hygiene items open: 42 archived raw files missing their processed: true stamp (re-digestion landmine — T-0007), and 8 orphan sources + 5 dead template links from the lint/graph (T-0008). The janitor now surfaces raw backlog + stamp gaps in NOW.md. Next steps - T-0007 (hyperagent): stamp the 42 archived raw files - T-0008 (claude-code): curator pass — orphan sources, dead template links, backlinks - Next compile: regenerate the wiki graph snapshot on request Where things live - Wiki: wiki/ in this vault (rules: schema/AGENTS.md , modes: schema/curate-modes.md , skill: .claude/skills/curate/ ) - Intake: raw/ → archive raw/processed/<category / · curator "},{"p":"DECISIONS.md","y":"decision","ti":"2026-06-11 — Fleet plan board, resume points & self-maintaining state","tg":"","al":"","b":"- Context: No shared planning layer; state decayed between manual regenerations; resuming a project required ACTIVITY archaeology; Dwayne: vault = fleet coordination + second brain, central place for everyone. - Decision: Plan/ task board (claim protocol, single-writer), Project/<slug .md resume points (read first, update before stopping), janitor in build-context.sh (auto-close 48h sessions, archive DONE channel 48h, board/resume/raw lints), research-once rule, API-agent write path. Details: sdd/decisions/0004-fleet-plan-board.md - Agents: hyperagent (design+build), Dwayne (spec approval + amendments) - Project: agent-memory - Status: active"},{"p":"DECISIONS.md","y":"decision","ti":"2026-05-31 — Study guides via nlm query instead of nlm report create","tg":"","al":"","b":"- Context: nlm report create --prompt \"Focus on X\" produces generic content covering all notebook sources. The --prompt flag is treated as a style suggestion, not a content filter. - Decision: Use nlm notebook query for study guides. Returns focused, citation-rich content. Keep nlm report create only for notebook-level (non-focused) reports. - Agents: hermes - Project: study-pipeline (IGCSE Biology) - Status: active"},{"p":"DECISIONS.md","y":"decision","ti":"2026-05-31 — Flashcards difficulty is string, not integer","tg":"","al":"","b":"- Context: nlm flashcards create --difficulty 3 fails with \"Unknown difficulty '3'\". The skill docs incorrectly stated flashcards use integer difficulty (like quiz does). - Decision: Flashcards use --difficulty medium (string). Quiz uses --difficulty 3 (integer). Updated sherlock-study-boy skill quirks reference. - Agents: hermes - Project: study-pipeline - Status: active"},{"p":"DECISIONS.md","y":"decision","ti":"2026-05-31 — Weekend market hours bypassed for simulated trades","tg":"","al":"","b":"- Context: AI-Trader client blocks all US stock trades on weekends via market hours check. But simulated trades (price=0, executed at=\"now\") should work anytime. - Decision: Only enforce market hours when price 0 (real price trades). Simulated trades (price=0) bypass the check. - Agents: hermes - Project: ai-trader - Status: active"},{"p":"DECISIONS.md","y":"decision","ti":"2026-05-31 — AI-Trader expanded with strategy, discussion, feed, rebalance","tg":"","al":"","b":"- Context: AI-Trader client only had trade/positions/status/heartbeat commands. No way to publish strategies, browse feed, or analyze portfolio. - Decision: Added strategy (publish), discussion (publish), feed (browse), rebalance (analyze) CLI commands. Created Wolf→AI-Trader bridge script for auto-publishing sentiment signals. - Agents: hermes - Project: ai-trader - Status: active"},{"p":"DECISIONS.md","y":"decision","ti":"2026-05-31 — Second Brain vault wired to Hermes","tg":"","al":"","b":"- Context: Dwayne has a second-brain Obsidian vault (dman1313/second-brain) with wiki/, journal/, crm/ structure. Not connected to Hermes. - Decision: Cloned to ~/Documents/Obsidian Vault/second-brain/. Set OBSIDIAN VAULT PATH. Created sync script. Updated AGENTS.md references. - Agents: hermes - Project: second-brain - Status: active"},{"p":"DECISIONS.md","y":"decision","ti":"2026-05-25 — Activity feed and NOW.md dashboard added to shared memory","tg":"","al":"","b":"- Context: Agents had no way to see what other agents were working on. No activity log or current state dashboard. - Decision: Added ACTIVITY.md (append-only log), NOW.md (auto-generated dashboard), DECISIONS.md (architectural decisions). Updated AGENT-CHANNEL.md with messaging protocol. - Agents: claude-code - Project: agent-memory - Status: active"}];
const COLOR={entity:'#60a5fa',concept:'#c084fc',source:'#34d399',task:'#fbbf24',project:'#f87171',decision:'#7dd3fc'};
const GEN='2026-06-11';
document.getElementById('sub').innerHTML = DOCS.length+' documents indexed · snapshot '+GEN+' · <a href="graph.html">graph view ↗</a>';
let filter='all';
const tok=s=>(s.toLowerCase().match(/[a-z0-9]{2,}/g)||[]);
function score(d,terms,raw){
  const ti=d.ti.toLowerCase(), tg=(d.tg||'').toLowerCase(), al=(d.al||'').toLowerCase(), b=d.b.toLowerCase();
  let s=0;
  for(const t of terms){
    let hit=0;
    if(ti.includes(t)){s+=8;hit=1}
    if(al.includes(t)){s+=6;hit=1}
    if(tg.includes(t)){s+=4;hit=1}
    const n=b.split(t).length-1; if(n>0){s+=Math.min(n,5);hit=1}
    if(!hit) return 0; // every term must appear somewhere
  }
  if(ti.includes(raw)) s+=10;
  return s;
}
function excerpt(d,terms){
  const b=d.b, lb=b.toLowerCase();
  let i=-1; for(const t of terms){i=lb.indexOf(t); if(i>=0)break}
  if(i<0) i=0;
  const start=Math.max(0,i-90), end=Math.min(b.length,i+230);
  let ex=(start>0?'…':'')+b.slice(start,end)+(end<b.length?'…':'');
  ex=ex.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  for(const t of [...terms].sort((a,b)=>b.length-a.length)){
    ex=ex.replace(new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
  }
  return ex;
}
function run(){
  const raw=document.getElementById('q').value.trim().toLowerCase();
  const terms=tok(raw);
  const out=document.getElementById('out'), meta=document.getElementById('meta');
  if(!terms.length){out.innerHTML='';meta.textContent='type to search';return}
  const hits=DOCS.filter(d=>filter==='all'||d.y===filter)
    .map(d=>({d,s:score(d,terms,raw)})).filter(h=>h.s>0)
    .sort((a,b)=>b.s-a.s).slice(0,40);
  meta.textContent=hits.length+' result'+(hits.length===1?'':'s');
  out.innerHTML=hits.length?hits.map(({d})=>{
    const c=COLOR[d.y]||'#999';
    return `<div class="hit"><div class="top">
      <span class="badge" style="color:${c};border:1px solid ${c}44;background:${c}14">${d.y}</span>
      <h3>${d.ti.replace(/[&<>]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[x]))}</h3>
      <span class="path">${d.p}</span></div>
      <div class="ex">${excerpt(d,terms)}</div>
      ${d.tg?`<div class="tg">${d.tg.replace(/[&<>]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[x]))}</div>`:''}</div>`;
  }).join(''):'<div class="empty">no matches — try fewer or different words</div>';
}
let deb; document.getElementById('q').addEventListener('input',()=>{clearTimeout(deb);deb=setTimeout(run,120)});
document.getElementById('pills').addEventListener('click',e=>{
  if(!e.target.dataset.f)return; filter=e.target.dataset.f;
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('on',p===e.target)); run();
});
</script>
