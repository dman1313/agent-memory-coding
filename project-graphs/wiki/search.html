<style>
:root{--bg:#0a0f1e;--panel:#101729;--line:rgba(148,163,184,.14);--text:#e6ecf7;--muted:#8b97ad;--faint:#5b6779;
--entity:#60a5fa;--concept:#c084fc;--source:#34d399;--task:#fbbf24;--project:#f87171;--decision:#7dd3fc}
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(1100px 700px at 50% 0%,#111a33 0%,var(--bg) 60%);color:var(--text);font-family:Inter,system-ui,sans-serif;min-height:100vh}
.wrap{max-width:880px;margin:0 auto;padding:48px 24px 80px}
h1{font-size:21px;font-weight:700}
.sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin:4px 0 26px}
.sub a{color:var(--decision);text-decoration:none}
#q{width:100%;font-family:'IBM Plex Mono',monospace;font-size:16px;color:var(--text);background:rgba(16,23,41,.85);
border:1px solid var(--line);border-radius:14px;padding:16px 20px;outline:none}
#q:focus{border-color:rgba(125,211,252,.5)}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin:14px 0 6px}
.pill{font-size:11.5px;font-weight:600;color:var(--muted);padding:6px 13px;border-radius:999px;cursor:pointer;
border:1px solid var(--line);background:rgba(16,23,41,.6)}
.pill.on{background:#1c2a4a;color:var(--text)}
#meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--faint);margin:14px 2px}
.hit{background:rgba(16,23,41,.7);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:10px}
.hit .top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.badge{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;padding:3px 8px;border-radius:999px}
.hit h3{font-size:15px;font-weight:600}
.hit .path{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--faint);margin-left:auto}
.hit .ex{font-size:13px;line-height:1.6;color:#b9c4d8;margin-top:8px}
.hit .ex mark{background:rgba(125,211,252,.25);color:#e6f4ff;border-radius:3px;padding:0 2px}
.hit .tg{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--faint);margin-top:7px}
.empty{color:var(--faint);font-size:13px;padding:30px 4px;text-align:center}
footer{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--faint);margin-top:36px;line-height:1.6}
</style>

  Open any hit in Obsidian by its path. Companion view: graph.html (same folder).</footer>

<script>
const DOCS = [{"p":"wiki/entities/Claude-Code.md","y":"entity","ti":"Claude Code","tg":"product","al":"- Claude Code CLI","b":"Claude Code Basic Information - Type: product - Source: Plan-in-the-cloud-with-ultraplan Description Claude Code is a developer tool providing a hybrid workflow through both a Command Line Interface (CLI) and a web-based interface for coding and planning. It serves as the primary host environment for the ultraplan feature, enabling users to manage the entire lifecycle of a development plan. The product allows for seamless transitions where work can be initiated in a local terminal and refined in a cloud-hosted web application, ensuring consistent execution across different environments. Related Entities - ultraplan Related Concepts - No related concepts Mentions in Source - \"Start a plan from your CLI, draft it on Claude Code on the web, then execute it remotely or back in your terminal\""},{"p":"wiki/entities/agent-ready.md","y":"entity","ti":"Agent Ready","tg":"product","al":"AgentReady, agent-ready","b":"Agent Ready Basic Information - Type: product (SaaS / website layer) - Organization: Human Good AI - Status: trial (as of 2026-06) - Tech: Cloudflare Worker layer Description Agent Ready is Human Good AI's first commercial product. It adds a Cloudflare Worker layer to a customer's existing website, serving content in agent-friendly formats (Markdown, JSON) alongside the standard HTML — without requiring any changes to the customer's site. As AI agents become the primary way people browse the web, websites that are hard (token-expensive) for agents to parse will receive fewer agent-driven visits. Agent Ready reduces the token cost of scanning a site, making it more accessible to personal AI agents. Currently in trial with a small number of customers, with early results showing improved token efficiency during agent scans. Related Entities - Human Good AI — parent org - Dwayne Primeau — builder Related Concepts - Agentic AI - Token Efficiency - Agent-Friendly Web Mentions in Source \"Agent Ready described as a service that: Searches/tests a website to assess what's in HTML vs. agent-friendly formats; Helps ensure content is accessible in formats agents prefer (Markdown/JSON; simple/digestible structures)\" \"you connect to Cloudflare, which everybody knows Cloudflare, very secure great system. And we have a worker on Cloudflare that will get to put a layer on that sets your website up to be agent ready\" \"if you can put it in an agent-ready format, it reduces the amount of tokens or the cost of searching your website. It also makes it more friendly to personal agents.\" \"we've been testing it out with a couple different customers and they've found that it makes the token usages in scanning the websites more efficient\""},{"p":"wiki/entities/andrej-karpathy.md","y":"entity","ti":"Andrej Karpathy","tg":"person","al":"Karpathy","b":"Andrej Karpathy Basic Information - Type: person - Source: Building a Company Knowledge Vault Description Andrej Karpathy is credited as the originator of the LLM-curated wiki approach this vault is built on — using structured, human-readable wiki articles maintained by a language model in place of vector embeddings. The company-vault explainer borrows his principle directly as its core design choice. Related Entities - No related entities Related Concepts - LLM-curated wiki - knowledge-vault best practices Mentions in Source - \"The key design principle, borrowed from Andrej Karpathy's approach: structured wiki articles instead of vector embeddings.\""},{"p":"wiki/entities/angela.md","y":"entity","ti":"Angela","tg":"person","al":"Angela","b":"Angela Basic Information - Type: person - Role: admin / operations staff at ICS Paris Description Angela is an admin or operations staff member at ICS Paris. She appears in March 2025 transcripts about school renovation and restructuring planning. She is addressed directly in bilingual (English/Arabic/French) planning conversations about construction logistics — specifically regarding scaffolding, student dropoff, and lockers. Related Entities - ICS Paris — employer - Dwayne Primeau — principal Mentions in Source \"I never know. Maybe you explain in Arabic. No, no, tell me in French, in English. Okay, wait a minute… Is there a possibility to put a wall\""},{"p":"wiki/entities/canadian-academy.md","y":"entity","ti":"Canadian Academy","tg":"organization","al":"Canadian Academy, CA Osaka","b":"Canadian Academy Basic Information - Type: organization (IB school, Osaka, Japan) - Location: Osaka, Japan Description Canadian Academy is an IB school in Osaka, Japan. It appears in two contexts in this vault: as the former employer of John Schatzky (who served as head of school), and as an organization Dwayne Primeau mentions having worked at as a nonprofit school. It represents the kind of mission-driven school that Human Good AI aims to serve. Related Entities - John Schatzky — former head - Dwayne Primeau — former staff member Related Concepts - AI Back Office Mentions in Source \"charter schools, like the one I used to work for in Osaka, you know, a non-profit organization trying to make the world a better place\""},{"p":"wiki/entities/claudine.md","y":"entity","ti":"Claudine","tg":"person","al":"Claudine","b":"Claudine Basic Information - Type: person - Role: early childhood teacher at ICS Paris Description Claudine is an early childhood teacher at ICS Paris. She is mentioned in November 2024 transcripts in the context of art class logistics and snack scheduling. She complained about a previous art teacher (Manon) being ineffective, and is referenced as a colleague whose cooperation Dwayne Primeau needed when implementing new art class arrangements. Related Entities - ICS Paris — employer - Dwayne Primeau — principal - Lucy — art teacher Mentions in Source \"Claudine complained about Manon not being a good art teacher\" \"we just have to ask Claudine and say, hey, we really need you to start on these days, please\""},{"p":"wiki/entities/demis-hassabis.md","y":"entity","ti":"Demis Hassabis","tg":"person","al":"Demis Hassabis","b":"Demis Hassabis Basic Information - Type: person - Role: co-founder and CEO of DeepMind / Google DeepMind; cited as inspiration for Human Good AI Description Demis Hassabis is the CEO of Google DeepMind, widely known for directing AI research toward solving major scientific problems (AlphaFold, drug discovery). He is cited by Dwayne Primeau as an inspiration: a video about Hassabis and his stated goal of directing AI toward human benefit sparked early thinking about Human Good AI. Hassabis is not directly affiliated with Human Good AI. Related Entities - Dwayne Primeau — cited him as inspiration - Human Good AI — org he indirectly inspired Related Concepts - Human Good Principle Mentions in Source \"Demis Hassabis, and I was watching a video about him… he talked about human good. And that's where I came up with the idea of Demis is really wanting to put all of his efforts towards using AI or LLMs to help humanity in a positive way.\""},{"p":"wiki/entities/dwayne-primeau.md","y":"entity","ti":"Dwayne Primeau","tg":"person","al":"Dwayne, Dwayne Primeau","b":"Dwayne Primeau Basic Information - Type: person - Roles: founder of Human Good AI; educator; former principal/head of school Description Dwayne Primeau is the founder of Human Good AI and an educator with a background as a principal and head of school. He worked in international education (IB schools), including a nonprofit school in Osaka and later ICS Paris / Alpha Boulevard. He describes himself as a self-identified \"early adopter\" and \"agentic engineer\" — someone who actively builds with AI agent frameworks. The Human Good project emerged from his experience seeing how much time and money schools and nonprofits spend on back-office operations that could be automated. He is based in Paris as of 2026. Related Entities - Human Good AI — his startup - Agent Ready — product he is building - Paul — friend and collaborator - John Schatzky — educator collaborator - ICS Paris — school he was associated with Related Concepts - Agentic AI - AI Back Office - Human Good Principle Mentions in Source \"having been a principal and head of school and working with a lot of operations, I realized that AI could be used for things like, for example, in a nonprofit organization, it could help with volunteer rosters, it could help with email communications, marketing.\" \"I would call myself now I'm an agentic engineer. And what that means is I'm working a lot with these agents and looking at what they can do, and it changes every week a lot.\" \"I came from a pretty poor background and I was able to move forward in society through education\""},{"p":"wiki/entities/gloria.md","y":"entity","ti":"Gloria","tg":"person","al":"Gloria","b":"Gloria Basic Information - Type: person - Role: staff/teacher at ICS Paris; mentioned in context of art class coverage Description Gloria is a staff member at ICS Paris mentioned in November 2024 transcripts in the context of art class substitute coverage. She had the mistaken impression that Dwayne Primeau had personally covered art classes during Lucy's absence. Related Entities - ICS Paris — employer - Lucy — art teacher whose class she observed - Dwayne Primeau — principal Mentions in Source \"Gloria thought that I was the one who covered all the art. I said, no, we had a substitute\""},{"p":"wiki/entities/grain.md","y":"entity","ti":"Grain","tg":"product","al":"Grain.com","b":"Grain Basic Information - Type: product - Source: Building a Company Knowledge Vault Description Grain is a meeting-recording and transcription tool that served as the primary source pipeline for the company knowledge vault described in the explainer. Transcripts were ingested automatically from Grain via a local webhook server, and a backfill routine pulled historical meetings from Grain's API — together accounting for 98 meetings in the vault's raw/meetings/ . It is the canonical example of the \"start with one source\" advice in knowledge-vault best practices. Related Entities - No related entities Related Concepts - compile-raw - LLM-curated wiki Mentions in Source - \"98 meetings in raw/meetings/, ingested automatically from Grain via a local webhook server.\""},{"p":"wiki/entities/human-good-ai.md","y":"entity","ti":"Human Good AI","tg":"organization","al":"Human Good, Human Good AI, humangood-ai","b":"Human Good AI Basic Information - Type: organization (startup / social enterprise) - Founder: Dwayne Primeau - Stage: early — solo founder, products in trial Description Human Good AI is a startup founded by Dwayne Primeau with the mission of using AI agents to support nonprofits, charter schools, and mission-driven organizations — freeing humans from back-office admin so they can focus on meaningful work. The founding principle: \"less admin, more good.\" First product is Agent Ready, a Cloudflare Worker layer that makes websites agent-friendly. A longer-term goal is an \"office in a box\" for schools and nonprofits. Financially, Human Good plans to launch paid products first to fund goodwill/impact projects, alongside grant and token-donation fundraising. As of 2026-06, it is a solo operation. Related Entities - Dwayne Primeau — founder - Agent Ready — first product - Paul — early inspiration (bike ride conversation) - John Schatzky — educator collaborator - Demis Hassabis — inspiration cited for \"AI for human good\" framing Related Concepts - Agentic AI - AI Back Office - Drip-feed AI Adoption - Token Efficiency - Human Good Principle Mentions in Source \"the idea is that we have this agentic office in a box which can do your emails, your volunteer rosters, look at your schedule, remind people about substitute teaching\" \"It's about connecting the humans. It's using AI to do the things that we don't really enjoy so we can spend more time connecting. And that's the dawn of Human Good.\" \"Human good AI. What do we mean? Less admin, more good.\" \"we're trying to start a foundation, but originally, we're going to start off with launching a couple of paid products so that it can fund the other fun stuff\""},{"p":"wiki/entities/ics-paris.md","y":"entity","ti":"ICS Paris","tg":"organization","al":"ICS Paris, Alpha Boulevard, ICS","b":"ICS Paris Basic Information - Type: organization (IB international school, Paris, France) - Location: Paris, France - Programs: IB PYP (Primary Years Programme), IB DP (Diploma Programme) - Also referred to as: Alpha Boulevard (likely a campus or address) Description ICS Paris is an IB international school in Paris where Dwayne Primeau served as head/principal. The school runs both PYP (early childhood through primary) and DP programs, with a bilingual French-English environment. Recurring staff members in the transcripts include art teacher Lucy, coordinator Malou, teachers Tato, Justina, Victoria, Nicole, Gloria, Claudine, and admin Angela. The school is referred to as \"Alpha Boulevard\" in some notes, possibly the street address or a campus name. Related Entities - Dwayne Primeau — head/principal - Lucy — art teacher - Malou — coordinator - Tato — teacher - Justina — teacher - Victoria — staff - Sebastian — staff - Angela — admin Related Concepts - IB PYP - DEIJ - Guided Reading - TOTL Mentions in Source \"given we are an IB school, that should be happening\" \"we are going to implement changes for the benefit of students and the art program\""},{"p":"wiki/entities/john-schatzky.md","y":"entity","ti":"John Schatzky","tg":"person","al":"John Schatzky, John Shatsky","b":"John Schatzky Basic Information - Type: person - Role: educator; former head of Canadian Academy; collaborator on education-focused AI ideas Description John Schatzky is an educator and former head of Canadian Academy (Osaka). He has been in conversations with Dwayne Primeau about using AI to support overwhelmed teachers in Canada. His framing — \"give back to society\" rather than maximize profit — helped shape the mission of Human Good AI. He is working on projects to support Canadian schools. Related Entities - Dwayne Primeau — collaborator - Human Good AI — org he inspired - Canadian Academy — former employer Related Concepts - Human Good Principle - AI Back Office Mentions in Source \"I had another conversation with a friend, John Schatzky, who was the head of Canadian Academy two years ago… he was talking and we were talking about giving back to society.\" \"one of the projects that John's working on right now is how to support schools in Canada as he sees a real issue with teachers being overwhelmed.\""},{"p":"wiki/entities/justina.md","y":"entity","ti":"Justina","tg":"person","al":"Justina","b":"Justina Basic Information - Type: person - Role: teacher at ICS Paris Description Justina is a teacher at ICS Paris mentioned in November 2024 transcripts in the context of PD and assessment discussions. Dwayne Primeau discusses supporting her alongside other staff. Limited detail available from sampled sources. Related Entities - ICS Paris — employer - Dwayne Primeau — principal Related Concepts - IB PYP Mentions in Source \"Balancing PD, Assessment Discussions, and Supporting Justina\" (source title, 2024-11-20)"},{"p":"wiki/entities/kit.md","y":"entity","ti":"Kit","tg":"person","al":"Kit","b":"Kit Basic Information - Type: person - Role: student or staff member at ICS Paris / Alpha Boulevard; involved in a meltdown incident in March 2025 Description Kit is mentioned in a March 2025 transcript titled \"Managing Kit's meltdown incident and team communication concerns.\" Whether Kit is a student or a young staff member is not specified in available sources. The incident involved a meltdown and triggered concerns about team communication protocols at ICS Paris. Related Entities - ICS Paris — school context - Dwayne Primeau — principal handling the situation Mentions in Source \"Managing Kit's meltdown incident and team communication concerns\" (source title, 2025-03-14)"},{"p":"wiki/entities/lucy.md","y":"entity","ti":"Lucy","tg":"person","al":"Lucy","b":"Lucy Basic Information - Type: person - Role: art teacher at ICS Paris Description Lucy is the art specialist (atelierista/art teacher) at ICS Paris. She is a recurring subject of concern in the school transcripts: her resistance to collaboration with homeroom teachers, reluctance to attend planning meetings (CPMs), failure to share lesson plans in advance, and disputes over classroom logistics (location of art classes, use of a cart, cleanup responsibilities) are documented across multiple late 2024 voice notes. She claimed a handicap status (via CSE) which factored into decisions about where she taught. Dwayne Primeau and other staff developed a formal plan of essential agreements and coaching steps to address the issues. Related Entities - ICS Paris — employer - Dwayne Primeau — principal managing the situation - Gloria — colleague mentioned in context - Claudine — colleague Related Concepts - IB PYP - TOTL - Essential Agreements Mentions in Source \"an art teacher needs to be part of the planning. And the second thing is collaboration. Then the third thing is how do we put that into practice?\" \"she needs to have that room cleaned and teach the kids how to clean and support those kids on how to clean up\" \"she doesn't want to be told what to do\""},{"p":"wiki/entities/malou.md","y":"entity","ti":"Malou","tg":"person","al":"Malou","b":"Malou Basic Information - Type: person - Role: coordinator at ICS Paris (early childhood / PYP); discussed as potential future coach Description Malou is a coordinator at ICS Paris, primarily in the early childhood/PYP area. Dwayne Primeau reflects in late 2024 on reshaping her role — suggesting she move toward a coaching model (in-classroom support for teachers) rather than pure coordination. She is responsible for CSU meeting administration and is noted as needing to stay on top of scheduling. Her role and effectiveness are discussed sympathetically but with concerns about coverage and clarity of responsibility. Related Entities - ICS Paris — employer - Dwayne Primeau — principal Related Concepts - IB PYP Mentions in Source \"I think maybe making her more of a coach next year is a better idea than the coordinator… there's more of a coaching role where she's in the classroom she's taking the time to work with the teachers\""},{"p":"wiki/entities/nicole.md","y":"entity","ti":"Nicole","tg":"person","al":"Nicole","b":"Nicole Basic Information - Type: person - Role: teacher at ICS Paris; pregnant teacher on maternity leave Description Nicole is a teacher at ICS Paris who was expected to go on maternity leave. Her departure created staffing challenges in early childhood that Dwayne Primeau addressed by advertising for a replacement (including considering \"Lucy in the UK\" as a candidate). She is described as \"pretty neutral\" and noted for not communicating well. Related Entities - ICS Paris — employer - Dwayne Primeau — principal Mentions in Source \"Nicole pretty neutral I think she just doesn't communicate well right\""},{"p":"wiki/entities/paul.md","y":"entity","ti":"Paul","tg":"person","al":"Paul","b":"Paul Basic Information - Type: person - Role: educator, technology coach; friend and collaborator of Dwayne Primeau Description Paul is an educator and tech coach who was an early conversation partner for Human Good AI's founding ideas. During a bike ride with Dwayne Primeau, Paul raised the concept of using AI for human good — a conversation that partly inspired the name and direction of the organization. He and Dwayne discussed how AI could support schools practically. His surname is not recorded in available sources. Related Entities - Dwayne Primeau — friend and collaborator - Human Good AI — org he helped inspire Related Concepts - Human Good Principle - Agentic AI Mentions in Source \"I was talking to a friend, Paul, and we were going for a bike ride, and we were talking about deep think. And one of the researchers there… and how one of the researchers was pointing all of the LLMs to DNA and pharmaceutical coding 'cause he thought, 'Hey, you know what? We have a lot of great stuff here. We want to make the world a better place and help mankind.'\" \"Paul being an educator and myself being an educator, he's a tech coach, we started talking about how AI could be used to help support in schools.\""},{"p":"wiki/entities/sebastian.md","y":"entity","ti":"Sebastian","tg":"person","al":"Sebastian","b":"Sebastian Basic Information - Type: person - Role: staff member at ICS Paris; offered unexpected personal advice to Dwayne Primeau Description Sebastian is a staff member at ICS Paris who appears notably in November 2024 transcripts. In one voice note, Dwayne Primeau describes Sebastian coming to his office and giving unexpectedly candid and helpful personal advice about housing and life — which Dwayne found surprising and meaningful. Sebastian's professional role at the school is not fully specified in available sources. Related Entities - ICS Paris — employer - Dwayne Primeau — principal Mentions in Source \"Sebastian, like when I said it was weird he came to my office we talked about stuff and gave me advice on living and what I was living. Wow. Yeah, it was, I was like, wow. It was really weird.\""},{"p":"wiki/entities/symposium.md","y":"entity","ti":"Symposium","tg":"project","al":"Symposium, symposium toolchain","b":"Symposium Basic Information - Type: project (open-source Rust + AI agent toolchain) - Key figure: Nico (lead Rust designer since 2011, senior principal engineer at Amazon) - Context: Paris AI conference, May 2026 Description Symposium is an agent-targeted Rust toolchain that enables the Rust community (compiler contributors, crate authors) to provide up-to-date, crate-specific guidance directly to AI agents — bypassing the stale training data problem. Installed via Cargo, it configures agent hooks and provides \"skills\" (markdown files with metadata) that crate authors write once and that work across multiple agents (Codex, Claude, Qwen, etc.). Addresses the gap that no NPM/Cargo-equivalent marketplace exists for AI agent guidance. Related Entities - Dwayne Primeau — attended the Paris conference where this was presented Related Concepts - Agentic AI Mentions in Source \"Symposium's goal: an agent-targeted Rust toolchain enabling the Rust community (compiler contributors, library authors) to provide up-to-date guidance and crate-specific know-how directly to agents.\" \"Library authors provide extensions/services in a standard way. Users choose agents. Symposium converts/bridges between differing hook formats and conventions.\""},{"p":"wiki/entities/tato.md","y":"entity","ti":"Tato","tg":"person","al":"Tato","b":"Tato Basic Information - Type: person - Role: teacher at ICS Paris; subject of collaborative planning discussions Description Tato is a teacher at ICS Paris who appears in November 2024 transcripts in the context of collaborative planning progress. Dwayne Primeau met with Tato to work through coordination challenges. Limited additional detail available from current sources. Related Entities - ICS Paris — employer - Dwayne Primeau — principal Related Concepts - IB PYP Mentions in Source \"Meeting with Tato and Collaborative Planning Progress\" (source title, 2024-11-21)"},{"p":"wiki/entities/ultraplan.md","y":"entity","ti":"ultraplan","tg":"product","al":"- Ultraplan Tool","b":"ultraplan Basic Information - Type: product - Source: Plan-in-the-cloud-with-ultraplan Description ultraplan is a specialized tool integrated with Claude Code designed for cloud-based project planning. It enables developers to bridge the gap between local terminal operations and web-based drafting by allowing a plan to be initiated in the CLI and transitioned to a web environment for refinement. Once the plan is finalized, it can be executed either in the remote cloud environment or within the local terminal. Related Entities - Claude Code Related Concepts (No related concepts identified) Mentions in Source - \"ultraplan needs your input\" - \"Start a plan from your CLI, draft it on Claude Code on the web, then execute it remotely or back in your terminal\""},{"p":"wiki/entities/victoria.md","y":"entity","ti":"Victoria","tg":"person","al":"Victoria","b":"Victoria Basic Information - Type: person - Role: staff/teacher at ICS Paris Description Victoria is a staff member at ICS Paris mentioned in November 2024 transcripts. Referenced in the context of staffing decisions, specifically around Grade 1 classroom coverage. She suggested splitting or co-teaching arrangements when staffing gaps arose. Related Entities - ICS Paris — employer - Dwayne Primeau — principal Mentions in Source \"I told Victoria and she said to me that was the first thing and she said well when I see it that was the first thing I just have to find something. She said either that or whisper the class.\""},{"p":"wiki/concepts/Classification-Rules.md","y":"concept","ti":"Classification Rules","tg":"method","al":"- Categorization Guidelines","b":"Classification Rules Definition Classification Rules are a set of strict guidelines used to determine the assignment of the type and tags fields for every page within the wiki to ensure consistent data organization and integrity. Key Characteristics - Strict Type Restriction : Limits the type field to only three possible values: entity , concept , or source . - Finite Subtype Lists : Provides a predefined list of valid tags based on the chosen type (e.g., entities must be one of: person, organization, project, product, event, location, or other). - Automated Validation : Any tag not present in the approved subtype list is automatically removed by the system. - Data Integrity : Prevents the creation of fragmented or non-standard categories. Applications These rules are applied during the creation and updating of all wiki pages to ensure that the knowledge base remains searchable and logically structured. Related Concepts - Wiki-Structure - Entity-Page-Template - Concept-Page-Template Related Entities - Wiki-Schema-Configuration Mentions in Source - \"type field: entity concept source — the page category\" - \"tags field: stores the subtype (entity type or concept type)\" - \"Rule: tags MUST only contain values from the corresponding subtype list above. A tag not in the valid list will be removed by the system.\""},{"p":"wiki/concepts/Concept-Page-Template.md","y":"concept","ti":"Concept Page Template","tg":"method","al":"- Concept Page Structure","b":"Concept Page Template Definition The Concept Page Template is a standardized formatting method for documenting abstract ideas, theories, or terms within the concepts/ directory of the Wiki. It ensures consistency across theoretical entries by mandating specific frontmatter and structural sections. Key Characteristics - Standardized Frontmatter : Requires specific fields including type: concept and a valid subtype tag (theory, method, technology, term, or other). - Structured Sections : Focuses on Definition, Key Characteristics, and Applications to ensure theoretical clarity. - Traceability : Mandates a \"Mentions in Source\" section to link the concept back to original verbatim evidence. - Relational Linking : Requires the use of specific wiki-link paths to connect concepts to other theoretical ideas and practical entities. Applications - Used by Wiki maintainers to create new pages for theoretical frameworks. - Applied during the auditing process to ensure all concept pages meet the schema requirements. - Used to transform raw notes into structured knowledge base entries for better searchability and linking. Related Concepts - Entity Page Template - Classification Rules - Wiki Structure Related Entities - Wiki Schema Configuration Mentions in Source - \"Pages in concepts/ MUST follow this structure: Frontmatter fields: type: concept — page category (MUST be exactly \\\"concept\\\")\""},{"p":"wiki/concepts/Entity-Page-Template.md","y":"concept","ti":"Entity Page Template","tg":"method","al":"- Entity Page Structure","b":"Entity Page Template Definition The Entity Page Template is a mandatory structural framework for all pages located in the entities/ directory of the wiki. It ensures consistency and data integrity by requiring specific frontmatter metadata and a standardized set of five content sections. Key Characteristics - Mandatory Frontmatter : Requires specific fields including type (must be \"entity\"), created date, sources , and tags . - Standardized Sections : Enforces five required sections: Basic Information, Description, Related Entities, Related Concepts, and Mentions in Source. - Evidence-Based : Designed to ensure that all entity documentation is grounded in concrete facts and supported by verbatim source evidence. - Strict Classification : Integrated with the system's classification rules to maintain taxonomy integrity. Applications - Standardizing the creation of new entity pages within the wiki. - Auditing existing entity pages to ensure they meet the minimum documentation requirements. - Facilitating automated linting and validation of the knowledge base. Related Concepts - Concept Page Template - Classification Rules Related Entities - Wiki-Schema Mentions in Source - \"Pages in entities/ MUST follow this structure: Frontmatter fields: type: entity — page category (MUST be exactly \\\"entity\\\")\""},{"p":"wiki/concepts/Hybrid-Planning-Workflow.md","y":"concept","ti":"Hybrid Planning Workflow","tg":"method","al":"- Cloud-to-Local Planning","b":"Hybrid Planning Workflow Definition The Hybrid Planning Workflow is a software development method where the initiation, drafting, and execution of a plan are distributed across multiple interfaces—typically moving from a Command Line Interface (CLI) for speed, to a web-based Graphical User Interface (GUI) for detailed visualization and drafting, and finally back to a local or remote environment for execution. Key Characteristics - Multi-Interface Transition : Leverages different toolsets (CLI $\\rightarrow$ Web $\\rightarrow$ Local/Remote) based on the current stage of the planning process. - Optimized Tooling : Combines the efficiency and speed of the terminal for initialization with the rich visualization and editing capabilities of a web interface. - Reduced Context Friction : Streamlines the movement between high-level planning and technical implementation. - Cross-Environment Execution : Allows a plan drafted in a cloud environment to be executed seamlessly in the developer's actual working environment. Applications - Complex Software Refactoring : Using a CLI to trigger a planning session, drafting the architectural changes in a web-based visual editor, and executing the code changes in a local IDE. - Rapid Prototyping : Quickly initiating a feature request via terminal and refining the logic in a GUI before deployment. Related Concepts (No related concepts identified) Related Entities - ultraplan - Claude Code Mentions in Source - \"Start a plan from your CLI, draft it on Claude Code on the web, then execute it remotely or back in your terminal\""},{"p":"wiki/concepts/Naming-Conventions.md","y":"concept","ti":"Naming Conventions","tg":"method","al":"- Naming Standards","b":"Naming Conventions Definition Naming Conventions are a set of standardized rules defining how files and entities are titled to ensure systemic consistency, prevent translation errors, and maintain interoperability across a knowledge base. Key Characteristics - Slugified Filenames : Requires lowercase letters with hyphens for all file paths. - Language Preservation : Mandates that entity and concept names remain in their original source language to maintain accuracy. - Strict Linking Syntax : Enforces the use of full paths combined with display names (e.g., page-name ) to prevent broken links. - Language Agnosticism : Ensures primary identifiers are decoupled from the wiki's display language. Applications - Wiki Maintenance : Used to organize the file system and prevent naming collisions. - Link Integrity : Applied when creating internal cross-references to ensure the Lint system can validate paths. - Knowledge Integration : Used when importing data from multiple languages into a single centralized repository. Related Concepts - Wiki-Structure Related Entities - No related entities Mentions in Source - \"Filenames: lowercase-with-hyphens (slugified)\" - \"Entity/concept names: Preserve original language from source, NEVER translate\" - \"Wiki-links: Use full paths page-name or page-name\""},{"p":"wiki/concepts/Wiki-Schema.md","y":"concept","ti":"Wiki Schema","tg":"method","al":"- Wiki Schema","b":"Wiki Schema Definition The Wiki Schema is a governance framework that dictates how a Large Language Model (LLM) constructs and maintains a knowledge base. It establishes a directory-based organizational structure that separates information into entities, concepts, and sources to ensure standardized categorization, searchability, and verifiability. Key Characteristics - Structural Separation : Organizes content into distinct categories (entities, concepts, and sources) to prevent data overlap. - Template Enforcement : Mandates the use of specific page templates (such as Concept Page Template) to ensure consistency across the knowledge base. - Graph-Based Connectivity : Requires bidirectional linking to create a dense, navigable knowledge graph. - Strict Standardization : Implements rigorous Naming Conventions and Classification Rules to maintain system-wide integrity. - Consistency Maintenance : Defines necessary file structures and merging rules to enable a structured environment where information is easily discoverable. Applications - Automated Knowledge Base Construction : Used by LLMs to systematically transform unstructured data into a structured wiki. - Information Governance : Provides a set of rules to prevent \"wiki drift\" or inconsistent naming as the knowledge base scales. - Data Retrieval Optimization : Ensures that information is stored in predictable locations, improving the efficiency of RAG (Retrieval-Augmented Generation) systems. Related Concepts - Classification Rules - Naming Conventions - Wiki Structure - Concept Page Template - Entity Page Template Related Entities - Wiki Schema Configuration Mentions in Source - \"This file governs how the LLM builds and maintains your Wiki.\" - \"The Wiki Schema configuration defines a structural framework for organiz"},{"p":"wiki/concepts/Wiki-Structure.md","y":"concept","ti":"Wiki Structure","tg":"method","al":"- Wiki 组织结构","b":"Wiki Structure Definition Wiki Structure is the organizational methodology of a knowledge base that divides content into a strict directory-based hierarchy. It separates information into distinct categories—entities, concepts, and sources—to maintain a clear distinction between concrete objects and abstract ideas, ensuring predictable information retrieval for Large Language Models (LLMs). Key Characteristics - Directory Segregation : Content is physically and logically partitioned into entities/ , concepts/ , and sources/ directories. - Ontological Distinction : Clearly separates concrete instances (entities) from theoretical frameworks or definitions (concepts). - Predictability : Provides a systematic framework that allows LLMs to locate and categorize information based on predefined rules. - Centralized Control : Utilizes a central index and log to track the overall state of the knowledge base. Applications - LLM Knowledge Management : Organizing data so an AI agent can consistently distinguish between a \"Person\" (entity) and a \"Theory\" (concept). - Wiki Scaling : Preventing content clutter in large knowledge bases by enforcing a strict filing system. - Schema Enforcement : Implementing automated linting and validation based on the folder location of a page. Related Concepts - Classification Rules - Naming Conventions Related Entities - Wiki-Schema Mentions in Source - \"Entity pages: entities/ (person, organization, project, product, event, location, other)\" - \"Concept pages: concepts/ (theory, method, technology, term, other)\" - \"Source pages: sources/\""},{"p":"wiki/concepts/agent-friendly-web.md","y":"concept","ti":"Agent-Friendly Web","tg":"technology","al":"agent-friendly web, agent-ready format, agent-readable","b":"Agent-Friendly Web Definition The practice of serving website content in formats optimised for AI agent consumption (Markdown, JSON, structured data) alongside traditional human-facing HTML. As personal AI agents become the primary interface through which people discover and interact with websites, sites that are hard or expensive for agents to parse will be at a competitive disadvantage. Key Characteristics - Humans prefer rich HTML (videos, photos, styling); agents prefer plain, structured text - Agent-friendly formats: Markdown, JSON, well-labelled headings, minimal decoration - Can be served via a Cloudflare Worker layer — no change required to the origin site - Reduces token cost per agent visit - Increases likelihood of being visited by agent-driven users Applications - Agent Ready product implements this as a Cloudflare Worker - Any website wanting to attract AI-agent traffic or reduce scan costs Related Concepts - Token Efficiency - Agentic AI Related Entities - Agent Ready - Human Good AI Mentions in Source \"Humans like HTML, they like videos, they like photos. Agents don't. Agents like Markdown, they like simple, they want to digest that information and collate it and then move forward.\" \"we have a worker on Cloudflare that will get to put a layer on that sets your website up to be agent ready so agents can read it and maximizes their token usage\""},{"p":"wiki/concepts/agentic-ai.md","y":"concept","ti":"Agentic AI","tg":"technology","al":"Agentic AI, agentic frameworks, agents, AI agents","b":"Agentic AI Definition AI systems that go beyond responding to prompts and instead act autonomously — executing tasks, using tools, browsing the web, running code, and making sequential decisions on a user's behalf. Distinguished from simple chatbots by their capacity for initiative and multi-step action. Anthropic distinguishes workflows (LLM orchestrated by predefined code) from agents (LLM dynamically directing its own process). Key Characteristics - Agents can be given personas and delegated specific roles (travel agent, email triage agent, etc.) - They consume tokens (LLM compute cost) proportional to complexity of tasks - Operate within \"agentic frameworks\" — environments hosting multiple virtual workers - Can take real-world actions: purchasing, emailing, browsing, coding - Best practice (Anthropic): start simple, only add agent complexity when workflow patterns are insufficient Applications - Email triage: surface priority parent emails for school leaders - Back office automation: volunteer rosters, scheduling, marketing for nonprofits - Web scraping/browsing: personal agents scanning websites on behalf of users — driving the need for Agent-Friendly Web - Curriculum planning support: wiki-based teacher assistant (see Teacher AI Assistant) - Development toolchains: Symposium project (Rust community) — agents using up-to-date crate guidance Related Concepts - Agent-Friendly Web - Token Efficiency - AI Back Office - Drip-feed AI Adoption - Teacher AI Assistant Related Entities - Human Good AI — builds agentic solutions for nonprofits/schools - Agent Ready — product for agent-friendly websites - Dwayne Primeau — self-described \"agentic engineer\" Mentions in Source \"agentic frameworks. And what an agentic framework is, is it's a place where you hold multiple virtual w"},{"p":"wiki/concepts/ai-back-office.md","y":"concept","ti":"AI Back Office","tg":"method","al":"AI back office, office in a box, agentic office","b":"AI Back Office Definition The idea of delegating operational/administrative tasks — email triage, scheduling, volunteer rosters, marketing, communication — to AI agents, freeing humans in mission-driven organizations to focus on people-facing work. Coined internally at Human Good AI as \"less admin, more good.\" Key Characteristics - Target customers: nonprofits, charter schools, mission-driven orgs with lean teams - Must be \"dead simple\" — accessible to non-technical staff - Covers: email prioritization, volunteer roster management, substitute teacher reminders, marketing drafts, newsletter creation - Does not replace human relationships — it makes more time for them - \"Agentic office in a box\" — a single deployable system covering multiple back-office functions Applications - Food bank: delivery coordination, volunteer list management - School: substitute reminders, parent email triage, newsletter drafts, schedule management - Nonprofit marketing: agent that takes voice note + photos → draft newsletter or email → human review → publish Related Concepts - Agentic AI - Human Good Principle - Drip-feed AI Adoption Related Entities - Human Good AI — primary developer of this model - Dwayne Primeau — conceptualized it Mentions in Source \"I started playing around with all these different agent frameworks and personas, and I built a system that could do marketing… the idea was that you would go over, take some photos, give it a blurb via voice, and then this pipeline or workflow goes out, looks at your photos, looks at your texts, your voice message… puts it into a newsletter or an email for your stakeholders.\" \"this agentic office in a box which can do your emails, your volunteer rosters, look at your schedule, remind people about substitute teaching\" \"our AI agentic agents o"},{"p":"wiki/concepts/atls.md","y":"concept","ti":"ATLs","tg":"method","al":"ATLs, Approaches to Learning, learner profile","b":"ATLs Definition Approaches to Learning — the IB's framework of transdisciplinary skills (thinking, communication, social, self-management, research) assessed alongside academic content in the IB PYP and other IB programmes. Also linked to the IB Learner Profile attributes (inquirer, thinker, communicator, etc.). Key Characteristics - Assessed in parallel with academic content - Used at ICS Paris for student reporting and planning - Connected to how teachers document their practice on TOTL Related Concepts - IB PYP - TOTL Related Entities - ICS Paris Mentions in Source \"Assessing ATLs and Learner Profile Attributes in Schools\" (source title, 2024-11-13)"},{"p":"wiki/concepts/compile-raw.md","y":"concept","ti":"compile-raw","tg":"sop","al":"compile raw, raw-to-wiki ingestion","b":"compile-raw Definition compile-raw is the standard operating procedure for turning unprocessed raw/ files into curated wiki/ pages: find unprocessed files, extract entities/concepts/decisions selectively, create or append dated sections, cross-link aggressively, then mark the raw file processed and archive it. In this vault it is implemented as the compile mode in schema/curate-modes.md . Key Characteristics - Find → extract → append → link → archive — a linear, append-only pipeline. - Selective extraction — passing mentions don't earn pages. - Direct quotes for strong claims — minimize interpretation; flag uncertainty. - Flag, don't merge — overlaps are surfaced for human decision. - Raw is immutable — only the processed flag changes; files move to raw/processed/<category / . Applications - The core ingest step of the LLM-curated wiki. - Run via the curate compile mode (or scribe for transcripts). Related Concepts - LLM-curated wiki - knowledge-vault best practices - Classification Rules Related Entities - Grain Mentions in Source - \"Your job is to turn raw inputs into a well-linked wiki.\" - \"An article with zero outbound links is a failure.\""},{"p":"wiki/concepts/deij.md","y":"concept","ti":"DEIJ","tg":"method","al":"DEIJ, Diversity Equity Inclusion Justice, DEI","b":"DEIJ Definition Diversity, Equity, Inclusion, and Justice — a framework for school culture and practice at ICS Paris. Referenced in November 2024 transcripts as an active initiative, including wellness programs and equity-focused professional development. Key Characteristics - Applied to school-wide culture, hiring, curriculum, and community engagement - Linked to \"Back to Wellness\" initiatives in Nov 2024 - Discussions include racial bias concerns, restorative meeting protocols Related Concepts - IB PYP — IB learner profile has overlap with DEIJ values - Essential Agreements Related Entities - ICS Paris - Dwayne Primeau Mentions in Source \"Back to Wellness and DEIJ Initiatives\" (source title, 2024-11-12) \"Discussion on Equity, Diversity, and Inclusive Practices\" (source title, 2024-12-03)"},{"p":"wiki/concepts/drip-feed-ai-adoption.md","y":"concept","ti":"Drip-feed AI Adoption","tg":"method","al":"drip-feed AI, gradual AI adoption, change management AI","b":"Drip-feed AI Adoption Definition A change management strategy for introducing AI tools to hesitant staff: start slowly, introduce tools incrementally (\"drip-feed\"), so that by the time full adoption is required, staff are already familiar and on board. Coined in the context of school and nonprofit leadership. Key Characteristics - Reduces resistance at the critical moment of full deployment - Works with the reality that change takes time and people need exposure - Contrasted with \"waiting for AI to settle down\" — which is not a viable strategy - Especially relevant for education and nonprofit contexts where tech adoption is uneven Applications - School leaders introducing email triage agents to teachers - Principals building familiarity before mandating agentic workflows - Any org where staff are hesitant about AI Related Concepts - Agentic AI - AI Back Office - Human Good Principle Related Entities - Dwayne Primeau — articulated the strategy - Human Good AI Mentions in Source \"if you start drip-feeding this to your staff or to those people that are hesitant to change now, you start the process slowly. By the time you actually need to use it, those people are on board with you.\""},{"p":"wiki/concepts/essential-agreements.md","y":"concept","ti":"Essential Agreements","tg":"sop","al":"essential agreements, staff agreements","b":"Essential Agreements Definition A formal set of agreed expectations established between school leadership and a staff member (or team), typically used when informal coaching has not produced the required behaviour change. At ICS Paris, essential agreements were used as a structured step in managing Lucy's non-compliance with collaboration and lesson-planning requirements. Key Characteristics - Written, specific, and time-bound commitments - Followed by a support/coaching offer if not met (\"how can we support you?\") - Non-compliance documented via email and tracked over time - Part of a progressive management approach: essential agreements → coaching → formal action Applications - Lucy art class: lesson plans 24h in advance, cleanup responsibilities, collaboration meetings - General staff management at ICS Paris Related Concepts - IB PYP Related Entities - ICS Paris - Dwayne Primeau - Lucy Mentions in Source \"So we put this as the essential agreement. If she doesn't, then we say, okay, how can we support you?… And each other has two choices. She gets on board or we squeeze her out.\""},{"p":"wiki/concepts/guided-reading.md","y":"concept","ti":"Guided Reading","tg":"method","al":"guided reading, literacy, running records, reading program","b":"Guided Reading Definition A structured small-group literacy instructional approach used at ICS Paris, where teachers work with groups of students at similar reading levels. Connected to running records assessment, levelled texts, and the broader literacy curriculum development work Dwayne was leading in 2024–2025. Key Characteristics - Requires a dedicated reading program and librarian support - Running records used for assessment (literacy benchmarking) - Challenged by lack of a strong librarian and resource organisation issues - Integrated with writing curriculum development - Aligns with IB PYP through the IB PYP units of inquiry Related Concepts - IB PYP - TOTL Related Entities - ICS Paris - Dwayne Primeau Mentions in Source \"Integrating Guided Reading and Writing with Children's Books\" (source title, 2024-11-12) \"Starting a Reading Program with Librarian Challenges\" (source title, 2024-12-05) \"Running Records and Literacy Assessment\" (source title, 2025-01-22)"},{"p":"wiki/concepts/human-good-principle.md","y":"concept","ti":"Human Good Principle","tg":"term","al":"- Human Good Principle","b":"Human Good Principle Definition The belief that technology — specifically AI — should be directed toward human benefit: connecting people, reducing meaningless labour, and freeing capacity for mission-driven work. Named after Human Good AI but articulated as a broader personal philosophy by Dwayne Primeau. Key Characteristics - Humans are hardwired to cooperate; technology should amplify that, not replace it - \"Giving back\" is a duty for those who have benefited from education and opportunity - AI should handle the tasks \"we don't really enjoy\" so humans can spend more time connecting - Kindness repays kindness; doing good creates positive feedback loops - Profit is a means to fund impact, not the end goal Applications - Founding mission of Human Good AI - Design principle for AI Back Office: automate admin, maximise human connection time - Personal ethic articulated in voice notes (2026-05-12) Related Concepts - AI Back Office - Agentic AI Related Entities - Dwayne Primeau - Human Good AI - Demis Hassabis — cited as inspiration - Paul — named the concept in conversation Mentions in Source \"It's about connecting the humans. It's using AI to do the things that we don't really enjoy so we can spend more time connecting. And that's the dawn of Human Good.\" \"kindness repays kindness. And even if it doesn't repay kindness, you just feel a lot better about yourself from being a good person.\" \"his point was that we want to give back to society. And that really aligns with the IB learner profile and the idea of being internationally minded.\" From human-good-ai Human Good AI Basic Information - Type: organization (startup / social enterprise) - Founder: Dwayne Primeau - Stage: early — solo founder, products in trial Description Human Good AI is a startup founded by Dwayne Primea"},{"p":"wiki/concepts/ib-pyp.md","y":"concept","ti":"IB PYP","tg":"method","al":"IB PYP, Primary Years Programme, PYP","b":"IB PYP Definition The International Baccalaureate Primary Years Programme — an inquiry-based framework for students aged 3–12. At ICS Paris, it governs curriculum planning, collaboration meetings (CPMs), transdisciplinary units of inquiry (UOIs), learner profile attributes, and Approaches to Learning (ATLs). Key Characteristics - Structured around transdisciplinary Units of Inquiry with central ideas and lines of inquiry - Requires collaboration between specialist teachers (art, music, PE) and homeroom teachers - Uses planners (TOTL) for unit documentation - ATLs (Approaches to Learning) and Learner Profile attributes are assessed and tracked - PASS test used for grades 2–5 assessment Applications - Curriculum planning meetings (CPMs) at ICS Paris - Art teacher collaboration requirements with homeroom teachers - Literacy/guided reading within the UOI framework Related Concepts - DEIJ - Guided Reading - TOTL - Essential Agreements - ATLs Related Entities - ICS Paris - Dwayne Primeau Mentions in Source \"given we are an IB school, that should be happening. So that needs to be written down somewhere.\" \"she should be planning with it. She should be on TOTL using TOTL to connect to the ideas.\""},{"p":"wiki/concepts/knowledge-vault-best-practices.md","y":"concept","ti":"knowledge-vault best practices","tg":"principle","al":"Knowledge Vault Best Practices, Second Brain Best Practices","b":"knowledge-vault best practices Definition A set of guiding principles for building and sustaining an LLM-curated wiki, distilled from real-world experience running a company knowledge vault. They govern how sources are ingested, how history is preserved, and how to tell whether the vault is earning its keep. Key Characteristics - Start with one source, not five — build ingestion for the single most valuable source first, stabilize, then add more. - Raw files are sacred — never edit them; mark processed and nothing else, preserving the audit trail for re-compiles. - Append, never overwrite — dated sections show how understanding evolved (the \"mindset\" growing over time). - Cross-link aggressively — \"a person article without company links, topic links, and meeting source links is an island.\" - Explicit rules in writing — agents skip implicit rules; write them down once (this vault: schema/AGENTS.md + schema/curate-modes.md ). - Set a 6-week forcing function — if outputs aren't clearly better after six weeks, kill it and learn from the postmortem. Applications - Operating guidance for this vault's curator and any fleet agent. - A principle -tagged page that grows append-only as practice evolves. Related Concepts - LLM-curated wiki - compile-raw Related Entities - Andrej Karpathy Mentions in Source - \"Raw files are sacred. Never edit them. Mark them processed, nothing else.\" - \"Cross-link aggressively. A person article without company links, topic links, and meeting source links is an island.\" Update 2026-06-10 from sources/notebooklm-wiki-research-2026-06-10 NotebookLM research extended these practices with scale- and fleet-aware rules (adopted via ADR 0002): - Align with the schema at ingestion — check every candidate page against the index and alias lists before creating"},{"p":"wiki/concepts/llm-curated-wiki.md","y":"concept","ti":"LLM-curated wiki","tg":"method","al":"LLM Wiki Pattern, Structured wiki over embeddings, Karpathy LLM Wiki","b":"LLM-curated wiki Definition An LLM-curated wiki is a knowledge-management pattern in which a language model maintains a graph of human-readable, cross-linked markdown articles — entities, concepts, and sources — instead of storing knowledge as vector embeddings. Credited to Andrej Karpathy, its value lives in explicit wikilinks rather than similarity search. Key Characteristics - Structured articles over embeddings — knowledge is curated prose, not vectors. - Explicit graph — relationships are written links, so related context is found by following links, not guessing. - Append-only history — articles accrue dated sections so the arc of understanding is preserved (see knowledge-vault best practices). - Human-readable — the graph opens directly in Obsidian. Applications - Personal or company \"second brain\" knowledge graphs maintained by an agent (this vault). - An alternative to RAG where the corpus structure is known and stable. - Feeding curated context to agents via the compile-raw procedure. Related Concepts - compile-raw - knowledge-vault best practices - Wiki Structure - Wiki Schema Related Entities - Andrej Karpathy Mentions in Source - \"The key design principle, borrowed from Andrej Karpathy's approach: structured wiki articles instead of vector embeddings.\" - \"this works better than RAG for a knowledge graph because the structure is explicit\""},{"p":"wiki/concepts/page-name.md","y":"concept","ti":"page-name","tg":"term","al":"- Slugification","b":"page-name Definition The process of converting a string of text into a \"slug,\" which is a URL-friendly, lowercase version of a title typically using hyphens to separate words. In the context of the Wiki Schema, this is the primary method for generating consistent and predictable filenames for all wiki pages. Key Characteristics - Case Insensitivity : All characters are converted to lowercase to avoid issues with case-sensitive file systems. - Hyphenation : Spaces and special characters are replaced by hyphens ( - ) to ensure compatibility with web standards and file paths. - Normalization : Removes non-alphanumeric characters to prevent broken links or encoding errors. - Predictability : Ensures that a specific title always results in the same filename, facilitating easy bidirectional linking. Applications - Filename Generation : Used to transform a page title like \"Wiki Structure\" into wiki-structure.md . - URL Pathing : Creating clean, readable paths for navigation within a digital knowledge base. - Index Mapping : Allowing the Wiki Structure to map human-readable titles to their corresponding system files. Related Concepts - Naming Conventions - Wiki Structure - Classification Rules Related Entities - Wiki-Schema-Configuration (No source content available for this page)"},{"p":"wiki/concepts/teacher-ai-assistant.md","y":"concept","ti":"Teacher AI Assistant","tg":"method","al":"teacher AI assistant, wiki-based teacher support, curriculum AI","b":"Teacher AI Assistant Definition An AI agent backed by a wiki of curriculum documents, lesson plans, meeting notes, and school policies — acting as a personal assistant that helps teachers plan, reminds them of decisions they made, and surfaces connections across the curriculum. Proposed by Dwayne Primeau as a near-term buildable project. Key Characteristics - Ingests: curriculum outcomes, program of inquiry, lesson reflections, meeting notes, school policies - Acts as: thinking partner (advice on lessons), long-range planner (cross-unit connections), reminder system (field trip letters, permission forms) - Stores teacher decisions in memory and recalls them at relevant moments - Differentiates from generic chatbot: context-aware, school-specific, privacy-conscious (GDPR) - Built on a llm-curated-wiki pattern Applications - Grade 2 math: fractions lesson didn't go well → agent suggests revisiting in a later unit with real-world context - Field trip reminders: \"Your Farm to Table unit is coming up — here's a checklist\" - Curriculum coverage: flag cohorts struggling on specific outcomes Related Concepts - llm-curated-wiki - Agentic AI - IB PYP Related Entities - Dwayne Primeau — conceptualised and plans to build it - Human Good AI - ICS Paris — intended use context Mentions in Source \"you could take a policy's procedures, you could take curriculum documents, teaching lessons, and put them into an agent's memory. And then this agent would work with you to come up with learning outcomes, help coach you along the way.\" \"The agent can say, 'Hey, you've got a unit on sustainability, farms, markets and all that. You could put in a unit on fractions there.' Suddenly, fractions isn't an isolated skill — it's connected to real contexts.\" \"it'll remind you, 'Hey, Dwayne. Here's the "},{"p":"wiki/concepts/token-efficiency.md","y":"concept","ti":"Token Efficiency","tg":"technology","al":"token efficiency, token cost","b":"Token Efficiency Definition Minimizing LLM tokens consumed when an agent browses or scans content. Tokens are the unit of compute cost; agents preferentially visit lower-cost sites as usage scales. Key Characteristics - HTML-heavy pages cost more tokens than clean Markdown/JSON - Agents will favour token-efficient sites over expensive ones - Directly impacts operator cost and agent response speed Applications - Agent Ready: serves Markdown/JSON layer via Cloudflare Worker alongside HTML - Agent-friendly content formatting (structured data, clear headings) Related Concepts - Agent-Friendly Web - Agentic AI Related Entities - Agent Ready - Human Good AI Mentions in Source \"if you can put it in an agent-ready format, it reduces the amount of tokens or the cost of searching your website\" \"they're going to go to the sites that are easier to read. Means reducing your amount of cost to scan your webpage, meaning there's a larger chance that you're going to get more visitors.\""},{"p":"wiki/concepts/totl.md","y":"concept","ti":"TOTL","tg":"technology","al":"TOTL, planning platform, curriculum planner","b":"TOTL Definition A digital curriculum planning platform used at ICS Paris for documenting units of inquiry, lesson plans, and collaboration records within the IB PYP framework. Teachers are required to plan and document on TOTL; Dwayne Primeau used it as a compliance and transparency mechanism. Key Characteristics - Plans remain stored permanently (\"it stays there forever\") - Specialist teachers (like Lucy) were required to use it for lesson documentation - Can be used to create templates to standardise planning - Central to collaboration between homeroom and specialist teachers Related Concepts - IB PYP Related Entities - ICS Paris - Dwayne Primeau - Lucy Mentions in Source \"I want to force her on the TOTL. Because it stays there forever.\" \"She should be on TOTL using TOTL to connect to the ideas.\""},{"p":"wiki/sources/Plan-in-the-cloud-with-ultraplan.md","y":"source","ti":"Plan in the cloud with ultraplan - Summary","tg":"Hybrid Planning Workflow","al":"Cloud Planning with ultraplan, 使用 ultraplan 进行云端规划","b":"Plan in the cloud with ultraplan - Summary Source - Original file: raw/Plan in the cloud with ultraplan.md - Ingested: 2026-06-03 Core Content This source introduces ultraplan, a feature integrated within Claude Code that facilitates a Hybrid Planning Workflow. The tool allows developers to initiate project plans via a Command Line Interface (CLI), transition to a web-based interface for more detailed drafting and refinement, and finally execute the resulting plan either in a remote cloud environment or locally within their terminal. This seamless integration aims to combine the efficiency of terminal operations with the visual capabilities of a web GUI. Key Entities - ultraplan - Claude Code Key Concepts - Hybrid Planning Workflow Main Points - Cross-Platform Transition : Enables a fluid move between CLI-based planning and web-based drafting. - Flexible Refinement : Plans started in the terminal can be visually refined on the Claude Code web interface. - Versatile Execution : Supports executing finalized plans both remotely in the cloud and locally in the terminal."},{"p":"wiki/sources/agent-ready-html-scan-cost.md","y":"source","ti":"Agent-Ready HTML Reduces Scan Cost","tg":"note","al":"","b":"Agent-Ready HTML Reduces Scan Cost Source - File: 2026-05-13 Agent-ready HTML reduces scan cost and attracts more AI visitors.md - Date: 2026-05-13 Duration: 34s Core Content Brief note: agents visit easier-to-read (lower token cost) sites preferentially → agent-ready sites get more agent-driven visitors. Key Entities - Agent Ready Key Concepts - Token Efficiency - Agent-Friendly Web Main Points - Agent-ready formatting = competitive advantage for attracting agent traffic"},{"p":"wiki/sources/agent-ready-making-websites-readable.md","y":"source","ti":"Agent Ready: Making Websites Readable for AI Agents","tg":"note","al":"Agent Ready website explainer 2026-06-05","b":"Agent Ready: Making Websites Readable for AI Agents Source - File: 2026-06-05 Agent Ready making websites readable and cheaper for AI agents.md - Date: 2026-06-05 Duration: 5m54s Core Content Explains Agent Ready: agents vs chatbots distinction, token costs of website visits, the Cloudflare Worker layer approach. Currently in trial with early customers showing improved token efficiency. No site changes required for the customer. Key Entities - Agent Ready - Human Good AI Key Concepts - Agentic AI - Agent-Friendly Web - Token Efficiency Main Points - Agentic framework = environment hosting multiple virtual workers - Token cost per website visit → agents prefer cheaper (Markdown/JSON) sites - Agent Ready: Cloudflare Worker, no customer changes required - Trial stage; early results positive"},{"p":"wiki/sources/agentic-ai-drip-feed.md","y":"source","ti":"Agentic AI is Here Now — Stop Waiting","tg":"note","al":"Agentic AI drip-feed 2026-05-13","b":"Agentic AI is Here Now — Stop Waiting Source - File: 2026-05-13 Agentic AI is here now — stop waiting, start drip-feeding your team.md - Date: 2026-05-13 Duration: 7m11s Core Content Dwayne Primeau argues that waiting for AI to stabilize is not viable. Recommends drip-feed AI adoption for hesitant staff. Examples: priority parent email triage for school leaders; pizzeria scheduling agent; school admissions conversational agent. Marketing paradigm shift: away from polished Instagram toward authentic, AI-powered Q&A. Key Entities - Dwayne Primeau - Human Good AI Key Concepts - Agentic AI - Drip-feed AI Adoption - AI Back Office Main Points - Jensen/NVIDIA \"what is your OpenClaw solution?\" prompt - Agentic = going beyond chatbot to autonomous multi-step work - Drip-feed strategy: start now with hesitant staff - Real use cases: email triage, pizzeria scheduling, school admissions"},{"p":"wiki/sources/agentic-wiki-teacher-assistant.md","y":"source","ti":"Agentic Wiki-Based Teacher Assistant","tg":"note","al":"","b":"Agentic Wiki-Based Teacher Assistant Source - File: 2026-06-05 Agentic wiki-based AI assistant for teacher curriculum planning and reminders.md - Date: 2026-06-05 Duration: 4m42s Core Content Dwayne Primeau proposes a wiki-backed AI teacher assistant: ingests curriculum, lessons, meeting notes → acts as thinking partner, long-range planner, and reminder system. Concrete example: Grade 2 fractions lesson not going well → agent suggests revisiting in Farm to Table unit. Also includes full blog post version. Key Entities - Dwayne Primeau - Human Good AI Key Concepts - Teacher AI Assistant - llm-curated-wiki - Agentic AI - IB PYP Main Points - Wiki + agent = contextual teacher support (not generic chatbot) - Stores teacher decisions; recalls at relevant moments - Use cases: lesson reflection, cross-unit planning, field trip checklists - Privacy / GDPR must be addressed from day one"},{"p":"wiki/sources/arabic-maintenance-transcript.md","y":"source","ti":"الصيانة والتغييرات في المدرسة (School Maintenance — Arabic)","tg":"note","al":"Arabic maintenance transcript, school renovation Arabic","b":"الصيانة والتغييرات في المدرسة (School Maintenance — Arabic) Source - File: 2025-01-22 الصيانة والتغييرات في المدرسة.md - Date: 2025-01-22 Duration: 21m35s Language: Arabic + English fragments Core Content Multi-party conversation about school building maintenance and renovation logistics at ICS Paris. Topics: scaffolding installation (phased exterior), window replacement, heating (radiator thermostats), locker placement, student dropoff during construction. Note: transcript is severely degraded by speech-to-text repetition artefacts — only partial content is recoverable. Key Entities - ICS Paris - Angela - Dwayne Primeau Main Points - Scaffolding: phased, one side at a time; no work before 8:45am - Contractor ID checks requested by Dwayne - Heating: digital tier-valve thermostats (1–5 range) - Windows: coordination with school director"},{"p":"wiki/sources/being-good-kindness.md","y":"source","ti":"Being Good and Kindness","tg":"note","al":"","b":"Being Good and Kindness Source - File: 2026-05-12 Being good and kindness repaying kindness through human cooperation.md - Date: 2026-05-12 Duration: 2m41s Core Content Dwayne Primeau reflects on cooperation as a human evolutionary trait, the value of doing good for its own sake, and how kindness creates reciprocal positive outcomes. Ties to the Human Good Principle. Key Entities - Dwayne Primeau Key Concepts - Human Good Principle Main Points - Humans evolved through cooperation: hunter-gatherer → tribes → technology freed time for art/culture - \"Kindness repays kindness\" even if not immediately - Manifestation can coexist with being good"},{"p":"wiki/sources/building-effective-ai-agents.md","y":"source","ti":"Building Effective AI Agents (Anthropic)","tg":"document","al":"Anthropic building effective agents","b":"Building Effective AI Agents (Anthropic) Source - File: Building Effective AI Agents.md - URL: https://www.anthropic.com/engineering/building-effective-agents - Created: 2026-06-08 Core Content Anthropic's engineering guide on building reliable agentic systems. Key distinction: workflows (predefined code paths) vs agents (LLM dynamically directs its own process). Recommends starting simple — augmented LLM calls before adding agentic complexity. Covers: building blocks (augmented LLM), workflow patterns, autonomous agents, MCP, and frameworks (Claude Agent SDK, Strands, Rivet, Vellum). Key Concepts - Agentic AI Main Points - Most successful implementations use simple, composable patterns — not complex frameworks - Start with direct LLM API calls; add frameworks only when needed - Workflows = predictable; agents = flexible but costly in latency/compute - MCP: standard way to integrate third-party tools"},{"p":"wiki/sources/hiring-pitch-paris-conference.md","y":"source","ti":"Hiring Pitch and AI Agents Ecosystem Gaps — Paris Conference","tg":"note","al":"","b":"Hiring Pitch and AI Agents Ecosystem Gaps — Paris Conference Source - File: 2026-05-06 Hiring pitch and AI agents ecosystem gaps at Paris conference.md - Date: 2026-05-06 Duration: 28m19s Core Content Multi-speaker Paris conference recording. Covers: recruitment opportunities (Paris/Barcelona/remote), hackathon context, education integration background (K-12 LLM coaching), and a key discussion on the absence of a central agent marketplace/registry (no NPM equivalent for AI agents). Also covers MCP server limitations and \"skills\" mechanism criticisms. Key Entities - Dwayne Primeau — attendee/participant Key Concepts - Agentic AI Main Points - No central agent repository/marketplace — ecosystem gap noted by multiple speakers - MCP servers: known problems but debated as root cause - Skills (Markdown + resources) fail if agent doesn't know to use them - Education integration: K-12 LLM coaching approach discussed"},{"p":"wiki/sources/human-good-agent-ready-back-office.md","y":"source","ti":"Human Good AI: Agent Ready and AI Back Office","tg":"note","al":"Human Good AI back office 2026-05-21","b":"Human Good AI: Agent Ready and AI Back Office Source - File: 2026-05-21 Human good AI Agent Ready and AI back office for schoolsnonprofits.md - Date: 2026-05-21 Duration: 6m54s Core Content Detailed voice note (with Spanish meeting report) covering: the origin of Human Good AI, the problem of AI overuse in education, Agent Ready product definition (Cloudflare layer for agent-friendly websites), and the funding strategy (paid products → fund goodwill projects). Key Entities - Human Good AI - Agent Ready - Dwayne Primeau - Paul - John Schatzky - Demis Hassabis Key Concepts - AI Back Office - Agentic AI - Token Efficiency - Agent-Friendly Web Main Points - AI overuse in education risk: agents writing PYP lines of inquiry or IB essays is not the goal - Coaching model preferred: AI as another teacher in the room, not a shortcut - Agent Ready: first product, Cloudflare Worker layer, pricing TBD - Funding: seeking token donations from companies, GoFundMe later"},{"p":"wiki/sources/human-good-less-admin-more-good.md","y":"source","ti":"Human Good AI: Less Admin, More Good","tg":"note","al":"","b":"Human Good AI: Less Admin, More Good Source - File: 2026-05-24 Human-good AI agents to reduce admin work and free time for mission.md - Date: 2026-05-24 Duration: 40s Core Content Concise tagline note: \"less admin, more good.\" AI agents handle busy work / office work so humans can follow the mission and connect with people. Key Entities - Human Good AI Key Concepts - AI Back Office - Human Good Principle Main Points - Tagline crystallised: \"less admin, more good\""},{"p":"wiki/sources/human-good-origin-story.md","y":"source","ti":"Human Good Origin Story","tg":"note","al":"Human Good origin story, Human Good founding story","b":"Human Good Origin Story Source - File: 2026-06-05 Human Good origin story AI agents to support nonprofits and education.md - Date: 2026-06-05 - Duration: 4m56s voice note - Speaker: Dwayne Primeau Core Content Dwayne Primeau narrates the founding story of Human Good AI: conversations with Paul (bike ride, Demis Hassabis inspiration) and John Schatzky (give-back-to-society framing) shaped the mission. First project was a newsletter pipeline (voice note + photos → agent drafts → human review). Evolved into an \"agentic office in a box\" for nonprofits/schools. Core principle: use AI for tasks we don't enjoy so we can spend more time connecting humans. Key Entities - Human Good AI - Dwayne Primeau - Paul - John Schatzky - Demis Hassabis Key Concepts - Human Good Principle - AI Back Office - Agentic AI Main Points - Origin: bike ride with Paul + Demis Hassabis video + John Schatzky conversation - First build: newsletter pipeline (voice + photos → agent draft → publish) - Mission: automate back-office for nonprofits/schools so humans can focus on human work - Plan: launch paid products first to fund goodwill/impact projects"},{"p":"wiki/sources/jeff-company-brain-compile-raw-skill.md","y":"source","ti":"compile-raw Skill - Summary","tg":"document","al":"compile-raw skill, Compile Raw Skill","b":"compile-raw Skill - Summary Source - Original file: raw/processed/docs/jeff-company-brain compile-raw-SKILL.md - Ingested: 2026-06-05 Core Content This source is the original compile-raw skill definition for turning raw inputs into a well-linked wiki — the basis for this vault's compile-raw procedure (now generalized as the compile mode in schema/curate-modes.md ). It specifies finding unprocessed files, extracting people/companies/projects/concepts selectively, pulling claims and decisions as direct quotes, and creating or appending dated sections with aggressive wikilinks . The original targets a topics/people/companies/projects taxonomy; this vault instead uses the entities/concepts/sources structure, so only the method is adopted, not its folder layout. Key Entities - No standalone entities (procedural document) Key Concepts - compile-raw - LLM-curated wiki - Wiki Structure Main Points - Selectivity : \"A name mentioned once in passing is not an entity worth a wiki article.\" - Links are mandatory : \"An article with zero outbound links is a failure.\" - Minimize interpretation : \"Lean on direct quotes for strong claims.\" - Flag, do not merge : surface overlaps for human decision rather than auto-merging. CONTRADICTION FLAG: the original topics/people/companies/projects taxonomy conflicts with this vault's entities/concepts/sources structure. Only the method is adopted, not the folders."},{"p":"wiki/sources/jeff-company-brain-vault-explainer.md","y":"source","ti":"Building a Company Knowledge Vault - Summary","tg":"document","al":"Building a Company Knowledge Vault, Company Brain Explainer","b":"Building a Company Knowledge Vault - Summary Source - Original file: raw/processed/docs/jeff-company-brain vault-explainer.md - Ingested: 2026-06-05 Core Content This source explains how a company knowledge vault built on the LLM-curated wiki pattern works and how to build one. It describes a three-layer flow — raw intake, an LLM-maintained wiki/ graph, and projects/ outputs — drawing from five source types (meeting transcripts via Grain, customer feedback, web clippings, backfilled history, and manual drops). The central design principle, credited to Andrej Karpathy, is to use structured wiki articles instead of vector embeddings, so the graph value lives in the wikilinks connecting everything. It closes with the operating advice captured in knowledge-vault best practices and the compile-raw procedure. Key Entities - Andrej Karpathy - Grain Key Concepts - LLM-curated wiki - compile-raw - knowledge-vault best practices Main Points - Structured wiki over embeddings : \"structured wiki articles instead of vector embeddings.\" - One direction of flow : raw → wiki → projects; raw files are never edited, only processed. - Better than RAG : \"this works better than RAG for a knowledge graph because the structure is explicit.\" - Compounding value : \"By
